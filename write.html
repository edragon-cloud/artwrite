<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Write · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
<style>
  .aw-write-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:start;border:1px solid var(--aw-border-2);border-radius:var(--aw-r-lg);overflow:hidden;box-shadow:var(--aw-shadow)}
  @media(max-width:960px){.aw-write-grid{grid-template-columns:1fr}}
  .aw-prompt-box{background:var(--aw-surface-2);border:1px solid var(--aw-border);border-radius:var(--aw-r);padding:18px 20px;margin-bottom:16px}
  .aw-prompt-box h4{margin:0 0 6px;font-size:.78rem;letter-spacing:.05em;text-transform:uppercase;color:var(--aw-primary);font-weight:700}
  .aw-prompt-text{color:var(--aw-ink);line-height:1.6;font-size:.95rem;white-space:pre-wrap}
  .aw-editor-toolbar{display:flex;gap:2px;padding:8px 10px;border:1px solid var(--aw-border);border-bottom:none;border-radius:var(--aw-r) var(--aw-r) 0 0;background:var(--aw-surface-2);flex-wrap:wrap}
  .aw-tb-btn{width:32px;height:32px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--aw-ink-2);font-weight:700;display:grid;place-items:center;font-size:.9rem}
  .aw-tb-btn:hover{background:var(--aw-primary-lt);color:var(--aw-primary)}
  .aw-hl-btn{width:24px;height:24px;border:1.5px solid rgba(0,0,0,.12);border-radius:6px;cursor:pointer;margin:0 2px;padding:0;transition:transform .1s}
  .aw-hl-btn:hover{transform:scale(1.15)}
  .aw-hl-clear{background:#fff !important;color:var(--aw-ink-3);font-size:.7rem;display:grid;place-items:center}
  .aw-grade-ov{position:fixed;inset:0;background:rgba(16,34,46,.55);backdrop-filter:blur(3px);z-index:700;display:none;align-items:center;justify-content:center}
  .aw-grade-ov.show{display:flex}
  .aw-grade-card{background:#fff;border-radius:20px;padding:38px 44px;box-shadow:0 24px 70px rgba(0,0,0,.3);text-align:center;max-width:420px;width:90%}
  .aw-grade-card h3{font-family:var(--aw-font-display);font-size:1.15rem;margin:18px 0 16px;color:var(--aw-primary);min-height:1.4em;transition:opacity .2s}
  .aw-grade-spin{width:52px;height:52px;border:4px solid var(--aw-primary-lt);border-top-color:var(--aw-primary);border-radius:50%;margin:0 auto;animation:awspin .8s linear infinite}
  @keyframes awspin{to{transform:rotate(360deg)}}
  .aw-grade-bar{height:8px;background:var(--aw-surface-2);border-radius:5px;overflow:hidden;margin:6px 0}
  .aw-grade-fill{height:100%;width:0;background:linear-gradient(90deg,#0A6EBD,#0A93BD);border-radius:5px;transition:width .6s ease}
  .aw-grade-sub{font-size:.82rem;color:var(--aw-ink-3);margin:12px 0 0}
  .aw-editor{min-height:calc(100vh - 300px);border:none;border-top:1px solid var(--aw-border);padding:20px 24px;font-family:var(--aw-font-body);font-size:1rem;line-height:1.8;color:var(--aw-ink);background:var(--aw-surface);outline:none;overflow-y:auto;resize:none}
  .aw-editor:focus{border-color:var(--aw-primary);box-shadow:inset 0 0 0 1px var(--aw-primary)}
  .aw-editor:empty:before{content:attr(data-ph);color:var(--aw-ink-3)}
  .aw-write-meta{display:flex;align-items:center;gap:16px;margin:12px 0;font-size:.85rem;color:var(--aw-ink-2)}
  .aw-timer{margin-left:auto;font-weight:700;font-family:var(--aw-font-display);color:var(--aw-primary)}
  .aw-side-panel{background:var(--aw-surface-2);border-left:1px solid var(--aw-border-2);padding:22px;height:calc(100vh - 140px);overflow-y:auto;position:sticky;top:0}
  .aw-side-panel h3{margin:0 0 14px;font-size:1rem}
  .aw-band{display:flex;align-items:center;gap:14px;margin-bottom:16px}
  .aw-band-circ{width:70px;height:70px;border-radius:50%;background:linear-gradient(135deg,var(--aw-primary),#0A93BD);display:flex;flex-direction:column;align-items:center;justify-content:center;flex:0 0 auto}
  .aw-band-num{font-size:1.7rem;font-weight:800;color:#fff;line-height:1;font-family:var(--aw-font-display)}
  .aw-band-lbl{font-size:.5rem;font-weight:700;color:rgba(255,255,255,.7);letter-spacing:.1em}
  .aw-crit{margin-bottom:12px}
  .aw-crit-top{display:flex;justify-content:space-between;font-size:.84rem;margin-bottom:4px}
  .aw-crit-name{color:var(--aw-ink-2);font-weight:500}
  .aw-crit-val{font-weight:700;color:var(--aw-ink)}
  .aw-bar{height:7px;background:var(--aw-border-2);border-radius:4px;overflow:hidden}
  .aw-bar-fill{height:100%;background:linear-gradient(90deg,var(--aw-primary),#0A93BD);border-radius:4px;width:0;transition:width .5s ease}
  .aw-fb-block{margin-top:14px;padding-top:14px;border-top:1px solid var(--aw-border-2)}
  .aw-fb-block h4{margin:0 0 8px;font-size:.82rem;color:var(--aw-primary);text-transform:uppercase;letter-spacing:.04em}
  .aw-fb-item{font-size:.86rem;line-height:1.5;color:var(--aw-ink-2);margin-bottom:8px;padding-left:10px;border-left:2px solid var(--aw-border)}
  .aw-fb-item b{color:var(--aw-ink)}
  .err-mark{color:var(--aw-danger);text-decoration:line-through}
  .fix-mark{color:var(--aw-writing);font-weight:600}
  .aw-revs{display:flex;flex-direction:column;gap:8px}
  .aw-rev{background:var(--aw-surface-2);border:1px solid var(--aw-border);border-radius:var(--aw-r-sm);padding:10px 12px;font-size:.84rem}
  .aw-rev-top{display:flex;justify-content:space-between;font-weight:600;color:var(--aw-ink);margin-bottom:3px}
  .aw-rev-note{color:var(--aw-ink-3);font-size:.78rem}
  .aw-keybar{display:flex;gap:8px;align-items:center;background:#FFF6E5;border:1px solid #F5D98A;border-radius:var(--aw-r-sm);padding:10px 12px;margin-bottom:16px;font-size:.85rem;color:#7A5A0A}
  .aw-keybar input{flex:1;border:1px solid #E8C566;border-radius:6px;padding:6px 10px;font-family:var(--aw-font-body)}
  .aw-tutor-fab{position:fixed;bottom:24px;right:24px;z-index:400;background:linear-gradient(135deg,#0A6EBD,#0A93BD);color:#fff;border:none;border-radius:30px;padding:14px 22px;font-weight:600;font-size:.95rem;cursor:pointer;box-shadow:0 8px 28px rgba(10,110,189,.4)}
  .aw-tutor-fab:hover{transform:translateY(-2px)}
  .aw-ask-fab{position:fixed;bottom:24px;right:24px;z-index:400;background:linear-gradient(135deg,#2E9367,#1E7E42);color:#fff;border:none;border-radius:30px;padding:14px 22px;font-weight:600;font-size:.95rem;cursor:pointer;box-shadow:0 8px 28px rgba(46,147,103,.4)}
  .aw-ask-fab:hover{transform:translateY(-2px)}
  .aw-hand-fab{position:fixed;bottom:78px;right:24px;z-index:400;background:#fff;color:#E0A32E;border:2px solid #E0A32E;border-radius:30px;padding:11px 20px;font-weight:600;font-size:.92rem;cursor:pointer;box-shadow:0 6px 20px rgba(224,163,46,.3)}
  .aw-hand-fab:hover{transform:translateY(-2px)}
  .aw-board-fab{position:fixed;bottom:132px;right:24px;z-index:400;background:#fff;color:#5B3FD6;border:2px solid #5B3FD6;border-radius:30px;padding:11px 20px;font-weight:600;font-size:.92rem;cursor:pointer;box-shadow:0 6px 20px rgba(91,63,214,.3)}
  .aw-board-fab:hover{transform:translateY(-2px)}
  .aw-board-ov{position:fixed;inset:0;background:rgba(16,34,46,.7);z-index:700;display:none;flex-direction:column}
  .aw-board-ov.show{display:flex}
  .aw-board-ov-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;background:#fff}
  .aw-board-ov iframe{flex:1;border:none;width:100%;background:#fff}
  .aw-ask-head{background:linear-gradient(135deg,#2E9367,#1E7E42);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .aw-tutor-panel{position:fixed;bottom:24px;right:24px;z-index:401;width:380px;max-width:calc(100vw - 32px);height:540px;max-height:calc(100vh - 48px);background:#fff;border-radius:18px;box-shadow:0 24px 70px rgba(0,0,0,.3);display:none;flex-direction:column;overflow:hidden}
  .aw-tutor-panel.show{display:flex}
  .aw-tutor-head{background:linear-gradient(135deg,#0A6EBD,#0A93BD);color:#fff;padding:14px 18px;display:flex;justify-content:space-between;align-items:center}
  .aw-tutor-badge{display:inline-block;background:rgba(255,255,255,.2);font-size:.66rem;padding:2px 8px;border-radius:10px;margin-left:8px;vertical-align:middle}
  .aw-tutor-warn{background:#FFF6E5;color:#7A5A0A;font-size:.76rem;padding:9px 14px;line-height:1.4;border-bottom:1px solid #F5D98A}
  .aw-tutor-keybar{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--aw-border-2)}
  .aw-tutor-keybar input{flex:1;border:1px solid var(--aw-border);border-radius:6px;padding:6px 10px;font-size:.85rem}
  .aw-tutor-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px}
  .aw-tutor-msg{max-width:85%;padding:9px 13px;border-radius:14px;font-size:.88rem;line-height:1.45;white-space:pre-wrap}
  .aw-tutor-msg.bot{background:var(--aw-surface-2);color:var(--aw-ink);align-self:flex-start;border-bottom-left-radius:4px}
  .aw-tutor-msg.user{background:var(--aw-primary);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
  .aw-tutor-input{display:flex;gap:6px;padding:12px;border-top:1px solid var(--aw-border-2)}
  .aw-tutor-input input{flex:1;border:1px solid var(--aw-border);border-radius:20px;padding:9px 14px;font-size:.88rem}
</style>

<body>
<div id="app"></div>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i file HTML n&agrave;y tr&ecirc;n GitHub. Upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

/*──────── session + params ────────*/
var sess = AW.session.require('student');
if (!sess) throw 'redirect';

var qp = new URLSearchParams(location.search);
var MODE = qp.get('mode') || 'free';               // free | homework | inclass
var TOPIC = qp.get('topic') || 'Free Writing';
var PROMPT = qp.get('prompt') || 'Write about your opinion on the given topic.';
var AI_NOTES = '';  // teacher's grading rules for this task (context)
var TASK_TYPE = qp.get('type') || '';
var TOPIC_ID = qp.get('topicId') || ('T' + Date.now().toString(36));
var RETRY = qp.get('retry') === '1';
var DURATION_MIN = parseInt(qp.get('duration') || '0', 10);

var MODE_LABEL = { free:'Free Writing', homework:'Homework', inclass:'In-class Practice' }[MODE] || 'Free Writing';

var nav = [
  { id:'modes',   label:'Practice Modes', icon:'modes', href:'student.html' },
  { id:'library', label:'Library', icon:'library', href:'library.html' },
  { id:'progress',label:'My Progress', icon:'progress', href:'student.html#progress' },
  { id:'settings',label:'Settings', icon:'settings', href:'student.html#settings' },
];

var content = AW.renderShell({
  mount:'app', nav:nav, eyebrow:'Student Interface', title:MODE_LABEL
});

var startTime = new Date();
var attempt = 1;

// If we have a real assignment topicId but no prompt in the URL (e.g. via Re-try),
// fetch the official prompt from the backend so the student sees the real đề bài.
var hasRealTopic = qp.get('topicId') && MODE !== 'free';
if (hasRealTopic) {
  AW.api('write.getPrompt', { topicId: TOPIC_ID }).then(function(res){
    if (res && res.success) {
      if (res.data.prompt && !qp.get('prompt')) {
        PROMPT = res.data.prompt;
        var pt = document.querySelector('.aw-prompt-text');
        if (pt) pt.innerHTML = AW.esc(AW.stripHtml(PROMPT));
      }
      AI_NOTES = res.data.aiNotes || '';  // teacher's grading rules
    }
  });
}

content.innerHTML =
  (AW.geminiKey.get() ? '' :
    '<div class="aw-keybar"><span>🔑 Nhập Gemini API key (lưu trên máy bạn) để chấm bài:</span>' +
    '<input id="keyInput" type="password" placeholder="AIza…"><button class="aw-btn aw-btn-accent" id="keySave" style="padding:6px 14px">Save</button></div>') +
  '<div class="aw-write-grid">' +
    '<div>' +
      (function(){
        var isFreeNoPrompt = (MODE==='free' && !qp.get('prompt'));
        if (isFreeNoPrompt) {
          return '<div class="aw-prompt-box" style="border:1.5px dashed var(--aw-primary-lt)"><h4>✍️ Your prompt (đề bài)</h4>' +
            '<textarea id="freePrompt" placeholder="Paste or type the IELTS Task 2 question you want to practice… The AI will grade your essay against this prompt." ' +
            'style="width:100%;min-height:70px;border:1px solid var(--aw-border);border-radius:8px;padding:10px;font-size:.92rem;font-family:var(--aw-font-body);resize:vertical;box-sizing:border-box"></textarea>' +
            '<p style="margin:8px 0 0;font-size:.78rem;color:var(--aw-ink-3)">💡 No prompt? You can still write freely — the AI will assess general Task 2 quality.</p></div>';
        }
        return '<div class="aw-prompt-box"><h4>'+AW.esc(TASK_TYPE || 'IELTS Task 2 Prompt')+'</h4>' +
          '<div class="aw-prompt-text">'+AW.stripHtml(PROMPT)+'</div></div>';
      })() +
      '<div class="aw-editor-toolbar">' +
        '<button class="aw-tb-btn" data-cmd="bold"><b>B</b></button>' +
        '<button class="aw-tb-btn" data-cmd="italic"><i>I</i></button>' +
        '<button class="aw-tb-btn" data-cmd="underline"><u>U</u></button>' +
        '<button class="aw-tb-btn" data-cmd="insertUnorderedList">•</button>' +
        '<span style="width:1px;height:20px;background:var(--aw-border);margin:0 6px"></span>' +
        '<button class="aw-tb-btn" id="fontDown" title="Smaller font">A−</button>' +
        '<button class="aw-tb-btn" id="fontUp" title="Larger font (up to 120px)" style="font-size:1.05rem">A+</button>' +
        '<button class="aw-tb-btn" id="clearFmt" title="Clear formatting" style="font-size:.78rem;width:auto;padding:0 8px">✕ Clear</button>' +
        '<span style="width:1px;height:20px;background:var(--aw-border);margin:0 6px"></span>' +
        '<span style="font-size:.75rem;color:var(--aw-ink-3);align-self:center;margin-right:4px">Highlight:</span>' +
        '<button class="aw-hl-btn" data-hl="#FFF3A3" style="background:#FFF3A3" title="Yellow"></button>' +
        '<button class="aw-hl-btn" data-hl="#B6F0C2" style="background:#B6F0C2" title="Green"></button>' +
        '<button class="aw-hl-btn" data-hl="#BFE0FF" style="background:#BFE0FF" title="Blue"></button>' +
        '<button class="aw-hl-btn" data-hl="#FFC9D6" style="background:#FFC9D6" title="Pink"></button>' +
        '<button class="aw-hl-btn" data-hl="#E0C9FF" style="background:#E0C9FF" title="Purple"></button>' +
        '<button class="aw-hl-btn aw-hl-clear" data-hl="clear" title="Remove highlight">✕</button>' +
      '</div>' +
      '<div class="aw-editor" id="editor" contenteditable="true" data-ph="Start writing your response here…"></div>' +
      '<div class="aw-write-meta"><span id="wc">0 words</span>' +
        (DURATION_MIN ? '<span class="aw-timer" id="timer">'+DURATION_MIN+':00</span>' : '') +
      '</div>' +
      '<div style="display:flex;gap:8px">' +
        '<button class="aw-btn aw-btn-ghost" id="pauseBtn" style="flex:0 0 auto;padding:12px 18px" title="Save your draft and continue later">⏸ Pause &amp; Save</button>' +
        '<button class="aw-btn aw-btn-primary" id="gradeBtn" style="flex:1">Get AI Feedback</button>' +
      '</div>' +
    '</div>' +
    '<div class="aw-side-panel" id="side">' +
      '<h3>'+(MODE==='free'?'AI Feedback':'Revision History')+'</h3>' +
      '<div id="sideBody"><p style="color:var(--aw-ink-3);font-size:.88rem">When finished, click <b>Get AI Feedback</b> to get your score and feedback.</p></div>' +
      '<div id="submitStatus" style="margin-top:14px;text-align:center;display:none"><span style="color:var(--aw-writing);font-weight:600">✓ Submitted</span></div>' +
    '</div>' +
  '</div>' +
  (MODE==='free' ?
    '<button class="aw-tutor-fab" id="tutorFab" title="Ask the AI writing tutor">💬 AI Tutor</button>' +
    '<div class="aw-tutor-panel" id="tutorPanel">' +
      '<div class="aw-tutor-head">' +
        '<div><b>AI Writing Tutor</b><span class="aw-tutor-badge">Free Writing only</span></div>' +
        '<button id="tutorClose" style="background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1">×</button>' +
      '</div>' +
      '<div class="aw-tutor-warn">⚠️ This chat is <b>not saved</b>. The tutor explains grammar, vocabulary & logic — it will <b>not</b> write, rewrite or polish text for you.</div>' +
      (AW.groqKey.get() ? '' :
        '<div class="aw-tutor-keybar"><input id="groqKeyInput" type="password" placeholder="Paste your Groq API key…"><button class="aw-btn aw-btn-accent" id="groqKeySave" style="padding:6px 12px">Save</button></div>') +
      '<div class="aw-tutor-msgs" id="tutorMsgs"><div class="aw-tutor-msg bot">Hi! Ask me about grammar, vocabulary, collocations or how to structure your ideas. I won\'t write sentences for you — but I\'ll help you write them yourself. 🙂</div></div>' +
      '<div class="aw-tutor-input"><input id="tutorInput" placeholder="Ask about grammar, a word, structure…"><button class="aw-btn aw-btn-primary" id="tutorSend" style="padding:8px 14px">Send</button></div>' +
    '</div>'
  : // inclass + homework: ask the real teacher
    (MODE==='inclass'?'<button class="aw-hand-fab" id="raiseHandBtn" onclick="toggleRaiseHand()">✋ Raise hand</button>':'') +
    (MODE==='inclass'?'<button class="aw-board-fab" id="boardFab" onclick="openBoardView()">📋 Board</button>':'') +
    '<button class="aw-ask-fab" id="askFab" title="Ask your teacher a question">🙋 Ask Teacher</button>' +
    '<div class="aw-tutor-panel" id="askPanel">' +
      '<div class="aw-ask-head">' +
        '<div><b>Ask your teacher</b><span class="aw-tutor-badge">'+(MODE==='inclass'?'Live — during class':'Homework')+'</span></div>' +
        '<button id="askClose" style="background:none;border:none;color:#fff;font-size:1.3rem;cursor:pointer;line-height:1">×</button>' +
      '</div>' +
      '<div class="aw-tutor-warn" style="background:#EAF2FB;color:#0A4A7A;border-color:#B8D4F0">💡 Your teacher will see your question'+(MODE==='inclass'?' live in class':'')+' and answer it. You\'ll find the reply in <b>Q&A with Teacher</b>.</div>' +
      '<div class="aw-tutor-msgs" id="askMsgs"></div>' +
      '<div class="aw-tutor-input"><input id="askInput" placeholder="Type your question to the teacher…"><button class="aw-btn aw-btn-primary" id="askSend" style="padding:8px 14px">Send</button></div>' +
    '</div>');

/*──────── key bar ────────*/
if (!AW.geminiKey.get()) {
  document.getElementById('keySave').onclick = function(){
    var k = document.getElementById('keyInput').value.trim();
    if (k) { AW.geminiKey.set(k); AW.toast('Đã lưu API key','ok'); document.querySelector('.aw-keybar').style.display='none'; }
  };
}

/*──────── editor toolbar ────────*/
var editor = document.getElementById('editor');
AW.els('.aw-tb-btn').forEach(function(b){
  if(!b.dataset.cmd) return; // skip font/clear buttons handled below
  b.onclick = function(){ document.execCommand(b.dataset.cmd, false, null); editor.focus(); };
});
// font size (real px, up to 120) + clear formatting
function editorChangeFont(dir){
  var sizes=[14,16,18,20,24,28,32,40,48,64,80,100,120];
  var sel=window.getSelection();
  if(!sel.rangeCount || sel.isCollapsed){ AW.toast('Select some text first','err'); return; }
  var node=sel.anchorNode; node=node.nodeType===3?node.parentNode:node;
  var cur=parseInt(window.getComputedStyle(node).fontSize,10)||16;
  var i=0,best=1e9; sizes.forEach(function(s,si){var d=Math.abs(s-cur);if(d<best){best=d;i=si;}});
  i=Math.max(0,Math.min(sizes.length-1,i+(dir>0?1:-1)));
  var px=sizes[i];
  var range=sel.getRangeAt(0), span=document.createElement('span');
  span.style.fontSize=px+'px';
  try{
    span.appendChild(range.extractContents()); range.insertNode(span);
    sel.removeAllRanges(); var nr=document.createRange(); nr.selectNodeContents(span); sel.addRange(nr);
  }catch(e){ document.execCommand('fontSize',false,dir>0?'5':'3'); }
  AW.toast('Font size: '+px+'px'+(px===120?' (max)':''),'ok',1000);
  editor.focus();
}
document.getElementById('fontUp').onclick=function(){ editorChangeFont(1); };
document.getElementById('fontDown').onclick=function(){ editorChangeFont(-1); };
document.getElementById('clearFmt').onclick=function(){
  document.execCommand('removeFormat', false, null);
  // removeFormat doesn't clear font-size spans or highlights → strip them manually in selection
  var sel=window.getSelection();
  if(sel.rangeCount && !sel.isCollapsed){
    document.execCommand('hiliteColor', false, 'transparent');
    document.execCommand('backColor', false, 'transparent');
    // unwrap font-size spans within selection
    var frag=sel.getRangeAt(0).cloneContents();
    var tmp=document.createElement('div'); tmp.appendChild(frag);
    tmp.querySelectorAll('span[style]').forEach(function(sp){ sp.removeAttribute('style'); });
    var r=sel.getRangeAt(0); r.deleteContents();
    var nodes=document.createRange().createContextualFragment(tmp.innerHTML);
    r.insertNode(nodes);
  }
  AW.toast('Formatting cleared','ok',1000);
  editor.focus();
};
AW.els('.aw-hl-btn').forEach(function(b){
  b.onclick = function(){

var lastResult=null;
document.getElementById('gradeBtn').onclick = function(){
  var text = editor.innerText.trim();
  if (AW.wordCount(text) < 20) { AW.toast('Write at least 20 words before grading.','err'); return; }
  var key = AW.geminiKey.get();
  if (!key) { AW.toast('Please enter your Gemini API key first.','err'); return; }

  // free-writing: use the prompt the student typed (if any)
  var fp = document.getElementById('freePrompt');
  if (fp && fp.value.trim()) { PROMPT = fp.value.trim(); TOPIC = fp.value.trim().slice(0,60); }

  var btn=this; btn.disabled=true; var orig=btn.textContent;
  btn.innerHTML='<span class="aw-spin"></span> Grading…';
  showGradingOverlay();

  gradeWithGemini({ writing:text, question:PROMPT, attempt:attempt, aiNotes:AI_NOTES }, key)
    .then(function(result){
      lastResult=result;
      renderFeedback(result);
      // save each graded attempt WITH full feedback JSON for later review
      return AW.api('write.saveResult', {
        studentId:sess.studentId, name:sess.name, mode:MODE, topic:TOPIC, topicId:TOPIC_ID,
        startTime:startTime.toISOString(), finishTime:new Date().toISOString(),
        duration:Math.round((Date.now()-startTime)/1000),
        tr:result.scores.TR, cc:result.scores.CC, lr:result.scores.LR, gra:result.scores.GRA,
        aiGrading:result.overall, teacherGrading:'', essay:text, class:(sess.class||''),
        feedback: JSON.stringify(result)
      });
    })
    .then(function(saveRes){
      if (saveRes && saveRes.locked) {
        // hit 3-attempt cap or past deadline
        AW.toast(saveRes.error||'This task is locked.','err',4000);
        lockEditor(saveRes.error||'This task is locked.');
        return;
      }
      if (saveRes && saveRes.success) attempt = (saveRes.data.attempt||attempt)+1;
      var done = (attempt-1) >= 3;
      AW.toast('Graded & saved (attempt '+(attempt-1)+'/3)','ok');
      if(window.clearDraft) window.clearDraft();
      if(MODE!=='free'){
        if(done){
          lockEditor('You have completed all 3 attempts for this task.');
        } else {
          editor.setAttribute('contenteditable','false');
          editor.style.background='var(--aw-surface-2)';
          var gb=document.getElementById('gradeBtn');
          if(gb){gb.textContent='Saved attempt '+(attempt-1)+'/3 – Re-try from My Progress';gb.disabled=true;}
          var ss2=document.getElementById('submitStatus');
          if(ss2)ss2.style.display='';
        }
        sendHeartbeat('Submitted');
      }
    })
    .catch(function(e){ AW.toast(e.message||'Grading error','err'); })
    .finally(function(){ hideGradingOverlay(); btn.disabled=false; btn.textContent=orig; });
};

/*──────── render feedback (indirect→direct by attempt) ────────*/
function renderFeedback(r){
  var s=r.scores||{};
  // Annotate essay on left (error marks inline) — always
  if(r.corrected_text || (r.gra_errors && r.gra_errors.length)){
    var essayText = editor.innerText;
    var annotated = essayText;
    if(r.gra_errors) r.gra_errors.slice(0,10).forEach(function(e){
      if(e.wrong && e.correct){
        var re=new RegExp(e.wrong.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
        annotated=annotated.replace(re,'<span class="err-mark">'+AW.esc(e.wrong)+'</span><span class="fix-mark"> →'+AW.esc(e.correct)+'</span>');
      }
    });
    if(r.lr_issues) r.lr_issues.slice(0,6).forEach(function(e){
      if(e.original && e.better){
        var re=new RegExp(e.original.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'g');
        annotated=annotated.replace(re,'<span style="text-decoration:underline;text-decoration-color:var(--aw-accent);text-decoration-style:wavy">'+AW.esc(e.original)+'<span style="color:var(--aw-accent);font-size:.8em"> (→'+AW.esc(e.better)+')</span></span>');
      }
    });
    editor.innerHTML=annotated;
    editor.setAttribute('contenteditable','false');
    editor.style.background='#FAFBFC';
  }
  var html =
    '<div class="aw-band"><div class="aw-band-circ"><div class="aw-band-num">'+(r.overall||'—')+'</div><div class="aw-band-lbl">BAND</div></div>' +
      '<div><b>'+AW.esc(r.band_description||'Overall Band')+'</b><p style="margin:4px 0 0;font-size:.82rem;color:var(--aw-ink-3)">'+AW.esc((r.overall_feedback_vi||'').slice(0,90))+'</p></div></div>' +
    crit('Task Response', s.TR) + crit('Coherence & Cohesion', s.CC) +
    crit('Lexical Resource', s.LR) + crit('Grammar', s.GRA);

  // For attempt 2-3: highlight whether old mistakes were repeated
  if (attempt >= 2 && r.repeated_errors_vi) {
    html += '<div class="aw-fb-block" style="border-left:3px solid var(--aw-accent);background:#FFF8EC"><h4>⚠ Repeated errors from last attempt</h4><div class="aw-fb-item">'+AW.esc(r.repeated_errors_vi)+'</div></div>';
  }

  // Overall feedback — always full
  if(r.overall_feedback_vi){
    html += '<div class="aw-fb-block"><h4>Overall Assessment</h4><div class="aw-fb-item">'+AW.esc(r.overall_feedback_vi)+'</div></div>';
  }
  // Task Response detail
  if(r.tr_comments && r.tr_comments.length){
    html += '<div class="aw-fb-block"><h4>Task Response</h4>'+r.tr_comments.slice(0,4).map(function(c){
      return '<div class="aw-fb-item">'+(c.original_idea?'<i>"'+AW.esc(c.original_idea)+'"</i><br>':'')+AW.esc(c.assessment_vi||'')+(c.suggestion_en?'<br><span style="color:var(--aw-primary);font-size:.85rem">→ '+AW.esc(c.suggestion_en)+'</span>':'')+'</div>';
    }).join('')+'</div>';
  }
  // Coherence
  if(r.cc_feedback && r.cc_feedback.assessment_vi){
    html += '<div class="aw-fb-block"><h4>Coherence & Cohesion</h4><div class="aw-fb-item">'+AW.esc(r.cc_feedback.assessment_vi)+
      ((r.cc_feedback.suggestions&&r.cc_feedback.suggestions.length)?'<br><span style="font-size:.85rem;color:var(--aw-primary)">→ '+AW.esc([].concat(r.cc_feedback.suggestions).join('; '))+'</span>':'')+'</div></div>';
  }
  // Grammar — full detail always
  if((r.gra_errors||[]).length){
    html+='<div class="aw-fb-block"><h4>Grammar ('+r.gra_errors.length+' issues)</h4>'+r.gra_errors.slice(0,8).map(function(e){
      return '<div class="aw-fb-item"><span class="err-mark">'+AW.esc(e.wrong)+'</span> → <span class="fix-mark">'+AW.esc(e.correct)+'</span>'+(e.explanation_vi?'<br><span style="font-size:.8rem;color:var(--aw-ink-3)">'+AW.esc(e.explanation_vi)+'</span>':'')+'</div>';
    }).join('')+'</div>';
  }
  // Lexical — full detail always
  if((r.lr_issues||[]).length){
    html+='<div class="aw-fb-block"><h4>Lexical Resource ('+r.lr_issues.length+' suggestions)</h4>'+r.lr_issues.slice(0,6).map(function(e){
      return '<div class="aw-fb-item"><span class="err-mark">'+AW.esc(e.original)+'</span> → <span class="fix-mark">'+AW.esc(e.better)+'</span>'+(e.explanation_vi?'<br><span style="font-size:.8rem;color:var(--aw-ink-3)">'+AW.esc(e.explanation_vi)+'</span>':'')+'</div>';
    }).join('')+'</div>';
  }
  document.getElementById('sideBody').innerHTML=html;
  setTimeout(function(){AW.els('.aw-bar-fill').forEach(function(b){b.style.width=b.dataset.w;});},50);
}
function crit(name,val){
  var pct=val?Math.min(100,(parseFloat(val)/9)*100):0;
  return '<div class="aw-crit"><div class="aw-crit-top"><span class="aw-crit-name">'+name+'</span><span class="aw-crit-val">'+(val||'—')+'</span></div>'+
    '<div class="aw-bar"><div class="aw-bar-fill" data-w="'+pct+'%"></div></div></div>';
}

/*──────── Gemini grading (adapted from original ArticuWrite) ────────*/
function applyBoost(r){
  ['TR','CC','LR','GRA'].forEach(function(k){
    if(r.scores&&typeof r.scores[k]==='number'){ r.scores[k]=Math.min(9,r.scores[k]+1); }
  });
  if(r.scores){
    var avg=(r.scores.TR+r.scores.CC+r.scores.LR+r.scores.GRA)/4;
    r.overall=Math.round(avg*2)/2;
  }
  return r;
}
async function gradeWithGemini(payload, geminiKey){
  var text=payload.writing||'', question=payload.question||'';
  var systemInstruction='You are a strict IELTS Writing examiner. Grade only the essay provided by the student. Every piece of feedback must quote directly from that essay. Never invent examples or use content from other essays.\n\n'+
    'IELTS BAND DESCRIPTORS:\n'+
    'TR/TA: Band 7=covers all parts, clear position, ideas developed. Band 6=addresses parts but some inadequately. Band 5=partial, limited. Band 4=minimal.\n'+
    'CC: Band 7=logical, varied cohesion, good paragraphing. Band 6=mostly coherent. Band 5=some org. Band 4=incoherent.\n'+
    'LR: Band 7=flexible range, minor errors. Band 6=adequate. Band 5=limited. Band 4=basic.\n'+
    'GRA: Band 7=complex structures, frequent error-free. Band 6=mix. Band 5=frequent errors. Band 4=many errors.\n\n'+
    'SCORING RULES:\n- Components: whole numbers or X.5 if borderline.\n- Overall = average of 4, round to 0.5.\n- Most students score 5-6. Band 7 = genuinely good. Band 8+ very rare.\n- Grammar errors → GRA ≤ 6. Basic vocab → LR ≤ 6.\n\n'+
    '[CONDITIONAL HARD-CAP RULES — enforce strictly, do not overlook any]\n'+
    '1) LEXICAL & GRAMMAR HARD LIMITS:\n'+
    '- IF the essay has more than 5 spelling mistakes THEN cap Lexical Resource (LR) at Band 5 and warn in Vietnamese: "Sai chính tả trên 5 lỗi không thể đạt Band 6 tiêu chí Vocab".\n'+
    '- IF there are basic punctuation errors or failure to capitalize proper nouns (e.g. "zoom" instead of "Zoom", "google meet" instead of "Google Meet") THEN cap GRA at Band 6.\n'+
    '- IF the student uses contractions (it\'s, don\'t) or informal vocabulary (e.g. "costly mistakes", "thanks to" instead of "due to") THEN penalize and require formal academic alternatives.\n'+
    '- IF a topic-specific keyword (e.g. "online meetings") is repeated more than 2 times in one body paragraph, OR more than 1 time in the Intro/Conclusion, THEN flag as a repetition error and suggest pronouns or contextual synonyms.\n'+
    '- IF the word "nowadays" is used THEN flag it as a cliché and demand removal or replacement.\n'+
    '2) TASK RESPONSE (CONTENT & LOGIC):\n'+
    '- IF an example or argument shifts context away from the prompt (prompt about "business" but student writes about "education"/"students") THEN flag as "Sai bối cảnh / Off-topic".\n'+
    '- IF an argument lacks real-world logic (e.g. "traffic noise" distracting someone "working from home", or "absent-mindedness" as a professional excuse) THEN counter-argue with a critical question exposing the logical flaw.\n'+
    '- IF the student introduces a new idea (especially at the end of a paragraph) without a supporting sentence THEN flag as "Lỗi liệt kê" (Listing error): the idea lacks development.\n'+
    '- IF the prompt does NOT ask to discuss "benefits and drawbacks" BUT the student includes them in the introductory paraphrase THEN flag as an inaccurate paraphrase.\n'+
    '3) COHERENCE & COHESION:\n'+
    '- IF an example merely rewrites the previous sentence with different vocabulary without adding specific concrete details THEN flag as "Invalid Example": an example must be more specific than the claim it supports.\n'+
    '- IF a Topic Sentence lists the specific main ideas to be discussed THEN advise keeping it broader with clear directional words (e.g. skeptical, advocate).\n'+
    '- IF a sentence states a result ("As a result, businesses reduce expenses") BUT the preceding sentence did not mention the corresponding cause (money/costs) THEN flag as a logical disconnect.\n'+
    '- IF transition words are combined redundantly ("Consequently, this...") THEN correct to a single cohesive device.\n'+
    '- IF the Conclusion is longer than 2 sentences OR re-lists the body main ideas THEN penalize for structural redundancy; instruct a single generalized summarizing sentence.\n'+
    'When any rule triggers, quote the exact sentence, use an arrow "=>", and give a precise academic correction. Apply caps to the numeric scores accordingly. These caps set the MAXIMUM; genuine weaknesses may score lower.\n\n'+
    'Return ONLY a JSON object with fields: scores(TR,CC,LR,GRA), overall, band_description, overall_feedback_vi, tr_comments(array of {original_idea,assessment_vi,suggestion_en}), gra_errors(array of {wrong,correct,explanation_vi}), lr_issues(array of {original,better,explanation_vi,alternatives}), cc_feedback({assessment_vi,issues,suggestions}), corrected_text, repeated_errors_vi.';
  // Strip HTML tags from question (may contain <b>,<i> from rich text editor)
  var tmp=document.createElement('div'); tmp.innerHTML=question;
  var cleanQ=(tmp.textContent||tmp.innerText||question).replace(/\s+/g,' ').trim();
  var attemptNote = payload.attempt >= 2
    ? '\n\nThis is revision attempt '+payload.attempt+'. In "repeated_errors_vi" (Vietnamese), note whether the student repeated the same TYPES of mistakes as a typical earlier draft (grammar/vocab/coherence) and encourage improvement. For attempt 1, leave repeated_errors_vi empty.'
    : '\n\nThis is the first attempt. Leave repeated_errors_vi empty. Give COMPLETE feedback on all 4 criteria so the student learns from the start.';
  var userMessage='Grade this IELTS essay.\n\nTASK PROMPT: '+cleanQ+'\n\nSTUDENT ESSAY TO GRADE:\n---\n'+text+'\n---\n\nAll feedback must reference the student essay above and be thorough. Task Response score MUST assess how directly the essay addresses the given task prompt. If the essay goes off-topic or misses the task, TR ≤ 5.'+attemptNote;
  // Teacher's context rules override default IELTS strictness
  if (payload.aiNotes && payload.aiNotes.trim()) {
    userMessage += '\n\n=== TEACHER\'S GRADING RULES (HIGHEST PRIORITY — these OVERRIDE the default IELTS strictness above) ===\n'+
      payload.aiNotes.trim()+
      '\n\nYou MUST follow these teacher rules. Do NOT flag, mark, or deduct points for anything the teacher has explicitly allowed or told you to ignore. Only report errors that remain genuine problems given these rules. This keeps feedback appropriate for the class context and avoids overwhelming the student with irrelevant corrections.';
  }
  var prompt=systemInstruction+'\n\n'+userMessage;

  var resp=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key='+geminiKey,{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:prompt}]}],generationConfig:{temperature:0.1,maxOutputTokens:12000}})
  });
  if(!resp.ok){var err=await resp.json().catch(function(){return{};});throw new Error('Gemini error: '+((err.error&&err.error.message)||resp.status));}
  var data=await resp.json();
  var raw=(((data.candidates||[])[0]||{}).content||{}).parts;
  raw=raw&&raw[0]?raw[0].text:'';
  if(!raw) throw new Error('Gemini returned empty. Try again.');
  var clean=raw.replace(/<thinking>[\s\S]*?<\/thinking>/gi,'').replace(/```json\s*/gi,'').replace(/```\s*/g,'').trim();
  var si=clean.indexOf('{'),depth=0,ei=-1;
  for(var ci=si;ci<clean.length;ci++){if(clean[ci]==='{')depth++;else if(clean[ci]==='}'){depth--;if(depth===0){ei=ci;break;}}}
  if(si===-1||ei===-1) throw new Error('Could not parse JSON from Gemini.');
  return applyBoost(JSON.parse(clean.substring(si,ei+1)));
}

      if(k){ AW.groqKey.set(k); AW.toast('Groq key saved','ok'); document.querySelector('.aw-tutor-keybar').style.display='none'; }

      var d=document.createElement('div'); d.className='aw-tutor-msg '+who; d.textContent=text;

    }
    function send(){
      var q=(input.value||'').trim(); if(!q)return;
      var key=AW.groqKey.get();
      if(!key){ AW.toast('Enter your Groq API key first','err'); return; }
      addMsg(q,'user'); input.value='';
      history.push({role:'user',content:q});
      var thinking=addMsg('…','bot');
      askGroq(history,key).then(function(reply){
        thinking.textContent=reply;
        history.push({role:'assistant',content:reply});
      }).catch(function(e){ thinking.textContent='⚠️ '+(e.message||'Error contacting Groq.'); });
    }
    if(input) input.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); send(); } };
    var sendBtn=document.getElementById('tutorSend'); if(sendBtn) sendBtn.onclick=send;
    // warn on leaving that chat isn't saved (only if the tutor was used)
    window.addEventListener('beforeunload', function(e){
      if(history.length){ e.preventDefault(); e.returnValue=''; }
    });
  })();
}

async function askGroq(history, key){
  var SYSTEM = "You are an IELTS writing TUTOR for a Vietnamese student practising Free Writing. "+
    "STRICT RULES you must always follow:\n"+
    "1. You ONLY explain: grammar, vocabulary, collocations, word choice, logic, coherence, essay structure, and general writing concepts.\n"+
    "2. You NEVER write, rewrite, paraphrase, 'polish', improve, or produce full sentences/paragraphs/essays for the student. NEVER give a ready-made sentence they could copy into their essay.\n"+
    "3. If the student asks you to write/rewrite/fix/polish their text, politely REFUSE and instead guide them with questions and principles so they write it themselves.\n"+
    "4. You may give short illustrative examples on NEUTRAL topics unrelated to their essay, to teach a concept — never on their actual essay content.\n"+
    "5. Keep answers concise and encouraging. You may answer in Vietnamese if the student writes in Vietnamese.\n"+
    "Stay strictly within a teaching role.";
  var messages=[{role:'system',content:SYSTEM}].concat(history.slice(-10));
  var res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({ model:'llama-3.3-70b-versatile', messages:messages, temperature:0.4, max_tokens:600 })
  });
  if(!res.ok){ var t=await res.text(); throw new Error('Groq error: '+res.status+(t?' '+t.slice(0,120):'')); }
  var data=await res.json();
  var reply=(((data.choices||[])[0]||{}).message||{}).content||'';
  return reply.trim() || '(no response)';
}

/*──────── Ask Teacher (In-class + Homework) ────────*/
if (MODE === 'inclass' || MODE === 'homework') {
  (function(){
    var fab=document.getElementById('askFab'), panel=document.getElementById('askPanel');
    var msgs=document.getElementById('askMsgs'), input=document.getElementById('askInput');
    if(fab) fab.onclick=function(){ panel.classList.add('show'); fab.style.display='none'; input&&input.focus(); loadMyAsks(); };
    var cb=document.getElementById('askClose');
    if(cb) cb.onclick=function(){ panel.classList.remove('show'); fab.style.display=''; };
    function bubble(text,who,answer){
      var d=document.createElement('div'); d.className='aw-tutor-msg '+who;
      d.textContent=text; msgs.appendChild(d);
      if(answer){ var a=document.createElement('div'); a.className='aw-tutor-msg bot';
        a.innerHTML='<b style="color:#1E7E42">Teacher:</b> '+AW.esc(answer); msgs.appendChild(a); }
      msgs.scrollTop=msgs.scrollHeight;
    }
    function loadMyAsks(){
      AW.api('query.listForStudent',{studentId:sess.studentId,class:sess.class}).then(function(res){
        var rows=((res&&res.data)||[]).filter(function(q){return String(q.topicId)===String(TOPIC_ID);});
        msgs.innerHTML='';
        if(!rows.length){ msgs.innerHTML='<div class="aw-tutor-msg bot">No questions yet for this task. Ask your teacher anything about it.</div>'; return; }
        rows.slice().reverse().forEach(function(q){ bubble(q.question,'user',q.answer); });
      });
    }
    function send(){
      var q=(input.value||'').trim(); if(!q)return;
      input.value='';
      bubble(q,'user');
      AW.api('query.create',{
        class:sess.class, studentId:sess.studentId, studentName:sess.name,
        mode:MODE, topic:TOPIC||PROMPT.slice(0,60), topicId:TOPIC_ID, attempt:attempt,
        question:q, phase:'live'
      }).then(function(res){
        if(res&&res.success){ AW.toast('Sent to your teacher','ok'); }
        else AW.toast('Failed to send','err');
      });
    }
    if(input) input.onkeydown=function(e){ if(e.key==='Enter'){ e.preventDefault(); send(); } };
    var sb=document.getElementById('askSend'); if(sb) sb.onclick=send;
    // refresh answers periodically while panel open (in-class real-time-ish)
    setInterval(function(){ if(panel.classList.contains('show')) loadMyAsks(); }, 12000);
  })();
}
