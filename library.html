<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Library · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
<style>
  .aw-modal-bg{position:fixed;inset:0;background:rgba(16,34,46,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
  .aw-modal-bg.show{display:flex}
  .aw-modal2{background:var(--aw-surface);border-radius:var(--aw-r-lg);width:100%;max-width:720px;max-height:88vh;overflow-y:auto;box-shadow:var(--aw-shadow-lg);padding:28px}
  .aw-modal2 h2{font-family:var(--aw-font-display);margin:0 0 4px;font-size:1.3rem}
  .aw-outline-para{background:var(--aw-surface-2);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:16px 18px;margin-top:14px}
  .aw-outline-para h4{margin:0 0 10px;color:var(--aw-primary);font-size:.95rem}
  .aw-mp{border-left:3px solid var(--aw-primary);padding-left:12px;margin-bottom:12px}
  .aw-mp-row{font-size:.88rem;line-height:1.5;margin-bottom:3px}
  .aw-mp-row b{color:var(--aw-ink);font-weight:600}
  .aw-lock-note{background:#FFF6E5;border:1px solid #F5D98A;border-radius:var(--aw-r-sm);padding:14px;color:#7A5A0A;font-size:.88rem;margin-top:14px}
  .aw-toggle{position:relative;display:inline-flex;align-items:center;gap:8px;cursor:pointer;font-size:.82rem;font-weight:600}
  .aw-toggle input{display:none}
  .aw-toggle .track{width:40px;height:22px;background:var(--aw-border);border-radius:12px;transition:background .2s;position:relative}
  .aw-toggle .track:after{content:'';position:absolute;top:2px;left:2px;width:18px;height:18px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:var(--aw-shadow-sm)}
  .aw-toggle input:checked+.track{background:var(--aw-writing)}
  .aw-toggle input:checked+.track:after{transform:translateX(18px)}
  .aw-lock-badge{font-size:.7rem;font-weight:700;padding:3px 9px;border-radius:var(--aw-r-pill)}
  .aw-lock-open{background:#E4F5EA;color:#1E7E42}
  .aw-lock-closed{background:#F0F1F3;color:#6B7683}
</style>
</head>
<body>
<div id="app"></div>
<div class="aw-modal-bg" id="modalBg"><div class="aw-modal2" id="modalBody"></div></div>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i c&aacute;c file HTML tr&ecirc;n GitHub. H&atilde;y upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

var sess = AW.session.require();
if (!sess) throw 'redirect';
var isTeacher = sess.role === 'teacher';

var nav = isTeacher ? [
  { id:'overview', label:'Class Overview', icon:'overview', href:'teacher.html' },
  { id:'live',     label:'Live Observation', icon:'live', href:'teacher.html#live' },
  { id:'assignments', label:'Assignments', icon:'modes', href:'teacher.html#assignments' },
  { id:'results',  label:'Results', icon:'results', href:'teacher.html#results' },
  { id:'board',    label:'Interactive Board', icon:'modes', href:'board.html' },
  { id:'library',  label:'Library', icon:'library', active:true },
] : [
  { id:'modes',   label:'Practice Modes', icon:'modes', href:'student.html' },
  { id:'board',   label:'Interactive Board', icon:'modes', href:'board.html' },
  { id:'library', label:'Library', icon:'library', active:true },
  { id:'progress',label:'My Progress', icon:'progress', href:'student.html#progress' },
];

var content = AW.renderShell({
  mount:'app', nav:nav,
  eyebrow:(isTeacher?'Teacher':'Student')+' Interface', title:'Library'
});

content.innerHTML =
  '<div class="aw-toolbar">' +
    '<div class="aw-search">'+AW.icon('search')+'<input id="q" placeholder="Search questions, topics, keywords…"></div>' +
    '<select class="aw-select" id="fTopic"><option value="">By topic</option></select>' +
    '<select class="aw-select" id="fType"><option value="">Task type</option></select>' +
  '</div>' +
  '<div id="grid" class="aw-grid"></div>' +
  '<div id="empty" class="aw-empty" style="display:none">'+AW.icon('library')+'<p>No prompts found.</p></div>';

var flat=[], grid=document.getElementById('grid'), empty=document.getElementById('empty');
grid.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span><p>Loading library…</p></div>';

AW.api('write.getLibrary',{}).then(function(res){
  if(!res||!res.success){grid.innerHTML='';empty.style.display='';return;}
  var lib=res.data||[];
  var topics={}, types={};
  lib.forEach(function(t){
    topics[t.topic]=1;
    (t.questions||[]).forEach(function(q){
      q.topic=t.topic; if(q.taskType)types[q.taskType]=1; flat.push(q);
    });
  });
  var fTopic=document.getElementById('fTopic');
  Object.keys(topics).forEach(function(tp){var o=document.createElement('option');o.value=tp;o.textContent=tp;fTopic.appendChild(o);});
  var fType=document.getElementById('fType');
  Object.keys(types).forEach(function(ty){var o=document.createElement('option');o.value=ty;o.textContent=ty;fType.appendChild(o);});
  render(flat);
}).catch(function(){grid.innerHTML='';empty.style.display='';});

function render(list){
  if(!list.length){grid.innerHTML='';empty.style.display='';return;}
  empty.style.display='none';
  grid.innerHTML=list.map(function(q,i){
    var lockBadge = isTeacher
      ? '<span class="aw-lock-badge '+(q.outlineUnlocked?'aw-lock-open':'aw-lock-closed')+'">'+(q.outlineUnlocked?'Outline: Open':'Outline: Locked')+'</span>'
      : '';
    return '<div class="aw-lib-card" data-i="'+i+'">' +
      '<h3 class="aw-lib-title">'+AW.esc(q.question||q.topic)+'</h3>' +
      (q.taskType?'<span class="aw-tag aw-tag-type">'+AW.esc(q.taskType)+'</span> ':'') +
      lockBadge +
      '<p class="aw-lib-desc">'+AW.esc(q.keywords||q.topic)+'</p>' +
    '</div>';
  }).join('');
  AW.els('.aw-lib-card').forEach(function(card){
    card.onclick=function(){ openDetail(list[+card.dataset.i]); };
  });
}

function applyFilters(){
  var v=(document.getElementById('q').value||'').toLowerCase();
  var tp=document.getElementById('fTopic').value, ty=document.getElementById('fType').value;
  render(flat.filter(function(q){
    if(tp&&q.topic!==tp)return false;
    if(ty&&q.taskType!==ty)return false;
    if(v){var hay=(q.question+' '+q.topic+' '+q.keywords+' '+q.taskType).toLowerCase();if(hay.indexOf(v)===-1)return false;}
    return true;
  }));
}
document.getElementById('q').oninput=applyFilters;
document.getElementById('fTopic').onchange=applyFilters;
document.getElementById('fType').onchange=applyFilters;

function mpBlock(label,mp){
  if(!mp || (!mp.mp&&!mp.why&&!mp.example&&!mp.result)) return '';
  return '<div class="aw-mp">'+
    (mp.mp?'<div class="aw-mp-row"><b>'+label+' — Main point:</b> '+AW.esc(mp.mp)+'</div>':'')+
    (mp.why?'<div class="aw-mp-row"><b>Why:</b> '+AW.esc(mp.why)+'</div>':'')+
    (mp.example?'<div class="aw-mp-row"><b>Example:</b> '+AW.esc(mp.example)+'</div>':'')+
    (mp.result?'<div class="aw-mp-row"><b>Result:</b> '+AW.esc(mp.result)+'</div>':'')+
  '</div>';
}
function outlineHtml(q){
  var b1=mpBlock('MP1',q.body1.mp1)+mpBlock('MP2',q.body1.mp2);
  var b2=mpBlock('MP1',q.body2.mp1)+mpBlock('MP2',q.body2.mp2);
  var html='';
  if(b1) html+='<div class="aw-outline-para"><h4>Body Paragraph 1</h4>'+b1+'</div>';
  if(b2) html+='<div class="aw-outline-para"><h4>Body Paragraph 2</h4>'+b2+'</div>';
  return html || '<p style="color:var(--aw-ink-3)">Chưa có dàn ý mẫu cho đề này.</p>';
}

function openDetail(q){
  var body=document.getElementById('modalBody');
  var showOutline = isTeacher || q.outlineUnlocked;
  var teacherToggle = isTeacher
    ? '<label class="aw-toggle"><input type="checkbox" id="lockTog" '+(q.outlineUnlocked?'checked':'')+'>'+
      '<span class="track"></span><span id="togLbl">'+(q.outlineUnlocked?'Outline visible to students':'Outline locked')+'</span></label>'
    : '';
  body.innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:start;gap:12px">'+
      '<div><div class="aw-eyebrow">'+AW.esc(q.topic)+(q.taskType?' · '+AW.esc(q.taskType):'')+'</div>'+
      '<h2>'+AW.esc(q.question)+'</h2></div>'+
      '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="closeDetail()">Close</button>'+
    '</div>'+
    (q.keywords?'<p style="color:var(--aw-ink-2);font-size:.9rem"><b>Keywords:</b> '+AW.esc(q.keywords)+'</p>':'')+
    (teacherToggle?'<div style="margin:10px 0">'+teacherToggle+'</div>':'')+
    (showOutline
      ? '<h3 style="font-family:var(--aw-font-display);margin:18px 0 0">Suggested Outline</h3>'+outlineHtml(q)
      : '<div class="aw-lock-note">🔒 Dàn ý mẫu cho đề này đang bị khoá. Giảng viên sẽ mở khi phù hợp. Bạn vẫn có thể luyện viết đề này ngay.</div>')+
    '<div style="margin-top:20px;display:flex;gap:10px">'+
      (isTeacher?'':'<button class="aw-btn aw-btn-primary" id="writeBtn">Write this prompt</button>')+
    '</div>';
  document.getElementById('modalBg').classList.add('show');

  if(isTeacher){
    document.getElementById('lockTog').onchange=function(){
      var tog=this;
      AW.api('library.toggleLock',{rowIndex:q.rowIndex}).then(function(res){
        if(res&&res.success){
          q.outlineUnlocked=res.data.outlineUnlocked;
          document.getElementById('togLbl').textContent=q.outlineUnlocked?'Outline visible to students':'Outline locked';
          AW.toast(q.outlineUnlocked?'Đã mở dàn ý cho sinh viên':'Đã khoá dàn ý','ok');
          applyFilters();
        } else { tog.checked=!tog.checked; AW.toast('Không đổi được trạng thái','err'); }
      });
    };
  } else {
    var wb=document.getElementById('writeBtn');
    if(wb) wb.onclick=function(){
      var p=new URLSearchParams({mode:'free',topic:q.topic,prompt:q.question,type:q.taskType||'IELTS Task 2'});
      location.href='write.html?'+p.toString();
    };
  }
}
window.closeDetail=function(){document.getElementById('modalBg').classList.remove('show');};
</script>
</body>
</html>
