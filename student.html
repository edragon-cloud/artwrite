<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
<style>
  .aw-mode-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;margin-bottom:28px}
  .aw-mode-card.aw-mode-locked{cursor:not-allowed;opacity:.55;filter:grayscale(.5)}
  .aw-mode-card.aw-mode-locked:hover{transform:none;box-shadow:var(--aw-shadow-sm)}
  .aw-lock-badge{font-size:.68rem;font-weight:700;background:var(--aw-surface-2);color:var(--aw-ink-3);padding:2px 8px;border-radius:10px;vertical-align:middle}
  .aw-mode-card{background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r-lg);padding:24px;cursor:pointer;transition:transform .14s,box-shadow .16s,border-color .16s;box-shadow:var(--aw-shadow-sm);position:relative;overflow:hidden}
  .aw-mode-card:hover{transform:translateY(-4px);box-shadow:var(--aw-shadow-lg);border-color:var(--aw-primary)}
  .aw-mode-ic{width:46px;height:46px;border-radius:12px;display:grid;place-items:center;font-size:1.5rem;margin-bottom:14px}
  .aw-mode-free .aw-mode-ic{background:#E4F5EA}
  .aw-mode-inclass .aw-mode-ic{background:var(--aw-primary-lt)}
  .aw-mode-hw .aw-mode-ic{background:#FEF3D6}
  .aw-mode-card h3{margin:0 0 6px;font-size:1.15rem;font-family:var(--aw-font-display)}
  .aw-mode-card p{margin:0;color:var(--aw-ink-2);font-size:.9rem;line-height:1.5}
  .aw-hist-list{display:flex;flex-direction:column;gap:10px}
  .aw-hist{display:flex;align-items:center;gap:14px;background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:14px 18px;box-shadow:var(--aw-shadow-sm)}
  .aw-hist-main{flex:1;min-width:0}
  .aw-hist-topic{font-weight:600;color:var(--aw-ink);margin-bottom:2px}
  .aw-hist-meta{font-size:.8rem;color:var(--aw-ink-3)}
  .aw-sec-title{font-family:var(--aw-font-display);font-size:1.25rem;font-weight:600;margin:0 0 16px;color:var(--aw-ink)}
  .p-res-wrap{border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(10,58,93,.08);border:1px solid var(--aw-border-2)}
  .p-res-table{width:100%;border-collapse:collapse;font-size:.84rem;white-space:nowrap}
  .p-res-table th,.p-res-table td{border:1px solid #EEF2F6;padding:9px 11px;text-align:center;position:relative}
  .p-res-table td:hover{z-index:200}
  .p-res-table thead tr:first-child th{background:linear-gradient(135deg,#0A6EBD,#1A5F9E);color:#fff;font-family:var(--aw-font-display);font-size:.82rem;padding:12px 11px}
  .p-res-table thead tr:nth-child(2) th{font-size:.7rem;font-weight:700}
  .pg-1{background:#EAF2FB} .pg-2{background:#EEEBFA} .pg-3{background:#E9F5EE} .pg-b{background:#FEF6E3}
  .p-score{font-weight:800;cursor:pointer;position:relative;display:inline-block;padding:5px 10px;border-radius:9px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08)}
  .p-score small{display:block;font-size:.58rem;color:var(--aw-ink-3);font-weight:600}
  .p-score:hover{box-shadow:0 2px 10px rgba(10,110,189,.3)}
  .p-score:hover .p-pop{display:block}
  .p-pop{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--aw-primary-dk);color:#fff;padding:8px 12px;border-radius:8px;font-size:.72rem;font-weight:500;white-space:nowrap;z-index:500;box-shadow:var(--aw-shadow-lg);pointer-events:none}
  .p-pop:after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--aw-primary-dk)}
  .aw-rev-bg{position:fixed;inset:0;background:rgba(16,34,46,.55);z-index:600;display:none;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto}
  .aw-rev-bg.show{display:flex}
  .aw-rev-modal{background:#fff;border-radius:16px;width:100%;max-width:720px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:26px}
  .aw-rev-modal .rv-block{margin-top:14px;padding-top:14px;border-top:1px solid var(--aw-border-2)}
  .aw-rev-modal .rv-block h4{color:var(--aw-primary);margin:0 0 6px;font-size:.85rem;text-transform:uppercase;letter-spacing:.03em}
  .aw-rev-modal .rv-block p{margin:0 0 6px;line-height:1.55;font-size:.9rem;color:var(--aw-ink-2)}
</style>
</head>
<body>
<div id="app"></div>
<div class="aw-rev-bg" id="reviewModal"><div class="aw-rev-modal" id="reviewModalBody"></div></div>
<div class="aw-rev-bg" id="discussModal"><div class="aw-rev-modal dm-body" style="max-width:480px"></div></div>

<script src="aw-common.js"></script>
<script>
if (window.AW && !AW.groqKey) {
  AW.groqKey = {
    get: function(){ return localStorage.getItem('aw_groq_key') || ''; },
    set: function(k){ localStorage.setItem('aw_groq_key', k || ''); }
  };
}
if (window.AW && !AW.renderTodaysWord) { AW.renderTodaysWord = function(){}; }
if (window.AW && !AW.bumpLoginCount) { AW.bumpLoginCount = function(){}; }
</script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i file HTML n&agrave;y tr&ecirc;n GitHub. Upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

var sess = AW.session.require('student');
if (!sess) throw 'redirect';

/* Is this student in an AI (experimental) class or a control class?
   Resolved before the first render so Free Writing never flashes unlocked. */
var AW_AI_ON = true;

var nav = [
  { id:'modes',   label:'Practice Modes', icon:'modes', active:true },
  { id:'board',   label:'Interactive Board', icon:'modes', href:'board.html' },
  { id:'library', label:'Library', icon:'library', href:'library.html' },
  { id:'progress',label:'My Progress', icon:'progress' },
  { id:'qa',      label:'Q&A with Teacher', icon:'results' },
  { id:'settings',label:'Settings', icon:'settings' },
];

var content = AW.renderShell({
  mount:'app', nav:nav, eyebrow:'Student Interface', title:'Practice Modes',
  onNav: function(id){
    // set the hash; routeFromHash() does the rendering (single source of truth)
    if((location.hash||'').replace('#','')===id) return;
    location.hash=id;
  }
});

function showModes(){
  document.getElementById('awPageTitle').textContent='Practice Modes';
  content.innerHTML =
    '<div id="todaysWord"></div>' +
    '<div class="aw-mode-grid">' +
      modeCard('free','✍️','Free Writing',
        AW_AI_ON ? 'Choose any topic and get instant AI feedback. Practice at your own pace.'
                 : 'Không khả dụng cho lớp của bạn.',
        'aw-mode-free' + (AW_AI_ON ? '' : ' aw-mode-locked')) +
      modeCard('inclass','⏱️','In-class Practice','Timed writing assigned by your teacher, with live guidance.','aw-mode-inclass') +
      modeCard('homework','📝','Homework','Complete assigned essays with the required number of revisions.','aw-mode-hw') +
    '</div>' +
    '<h2 class="aw-sec-title">Recent Practice</h2>' +
    '<div id="hist" class="aw-hist-list"><div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div></div>';
  AW.renderTodaysWord('todaysWord');

  AW.els('.aw-mode-card').forEach(function(c){
    c.onclick=function(){
      var m=c.dataset.mode;
      if(m==='free' && !AW_AI_ON){
        AW.toast('Mục Free Writing không khả dụng cho lớp của bạn. Hãy làm bài trong mục Homework hoặc In-class Practice.','err',5000);
        return;
      }
      if(m==='free'){ location.href='write.html?mode=free&topic='+encodeURIComponent('Free Writing'); }
      else { loadAssignments(m); }
    };
  });
  loadHistory();
}

function modeCard(mode,ic,title,desc,cls){
  var locked = cls.indexOf('aw-mode-locked') !== -1;
  return '<div class="aw-mode-card '+cls+'" data-mode="'+mode+'">' +
    '<div class="aw-mode-ic">'+ic+'</div><h3>'+title+(locked?' <span class="aw-lock-badge">🔒 Khoá</span>':'')+'</h3><p>'+desc+'</p></div>';
}

function loadHistory(){
  var box=document.getElementById('hist');
  if(!box) return;  // #hist only exists on the Modes view
  AW.api('write.getMyResults',{studentId:sess.studentId}).then(function(res){
    var box2=document.getElementById('hist');
    if(!box2)return;
    if(!res||!res.success||!res.data||!res.data.length){
      box2.innerHTML='<div class="aw-empty">'+AW.icon('progress')+'<p>No practice yet. Pick a mode above to start.</p></div>';
      return;
    }
    box2.innerHTML=res.data.slice(0,8).map(function(h){
      var band=h.overall||h.teacher||'—';
      return '<div class="aw-hist"><div class="aw-hist-main">' +
        '<div class="aw-hist-topic">'+AW.esc(h.topic||'Untitled')+'</div>' +
        '<div class="aw-hist-meta">'+AW.esc(h.mode)+' · Band '+AW.esc(String(band))+' · '+(h.timestamp?new Date(h.timestamp).toLocaleDateString():'')+'</div>' +
        '</div><button class="aw-btn aw-btn-ghost" style="padding:7px 16px" data-tid="'+AW.esc(h.topicId)+'" data-topic="'+AW.esc(h.topic)+'" data-mode="'+AW.esc(h.mode)+'">Re-try</button></div>';
    }).join('');
    AW.els('[data-tid]').forEach(function(b){
      b.onclick=function(){
        location.href='write.html?mode='+b.dataset.mode+'&retry=1&topicId='+encodeURIComponent(b.dataset.tid)+'&topic='+encodeURIComponent(b.dataset.topic);
      };
    });
  });
}

function loadAssignments(mode){
  content.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span><p>Loading assignments…</p></div>';
  AW.api('write.getAssignments',{class:sess.class,mode:mode}).then(function(res){
    document.getElementById('awPageTitle').textContent = mode==='homework'?'Homework':'In-class Practice';
    if(!res||!res.success||!res.data.length){
      content.innerHTML='<div class="aw-empty">'+AW.icon('modes')+'<p>No '+mode+' assigned yet. Check back later.</p>'+
        '<button class="aw-btn aw-btn-ghost" style="margin-top:14px" onclick="showModes()">← Back to modes</button></div>';
      return;
    }
    content.innerHTML='<button class="aw-btn aw-btn-ghost" style="margin-bottom:18px" onclick="showModes()">← Back</button>'+
      '<div class="aw-grid">'+res.data.map(function(a){
      var plain=AW.stripHtml(a.prompt||'').replace(/\s+/g,' ').trim();
      return '<div class="aw-lib-card" data-a=\''+AW.esc(JSON.stringify(a))+'\'>' +
        '<h3 class="aw-lib-title">'+AW.esc(a.topic)+'</h3>' +
        '<span class="aw-tag aw-tag-type">'+AW.esc(a.mode)+'</span> '+
        (a.requiredAttempts?'<span class="aw-tag aw-tag-medium">'+a.requiredAttempts+' revisions</span>':'')+
        '<p class="aw-lib-desc">'+AW.esc(plain.slice(0,140))+(plain.length>140?'…':'')+'</p></div>';
    }).join('')+'</div>';
    AW.els('[data-a]').forEach(function(c){
      c.onclick=function(){
        var a=JSON.parse(c.dataset.a);
        var p=new URLSearchParams({mode:a.mode,topic:a.topic,prompt:a.prompt,topicId:a.topicId,type:'IELTS Task 2'});
        if(a.durationMin) p.set('duration',a.durationMin);
        location.href='write.html?'+p.toString();
      };
    });
  });
}

var _progressSort='latest';
function showProgress(){
  document.getElementById('awPageTitle').textContent='My Progress';
  content.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div>';
  AW.api('write.getMyResults',{studentId:sess.studentId}).then(function(res){
    var rows=(res&&res.data)||[];
    if(!rows.length){
      content.innerHTML='<div class="aw-empty">'+AW.icon('progress')+'<p>No submissions yet. Start practicing to see your scores here.</p></div>';
      return;
    }
    window._myGroups = rows;
    content.innerHTML=
      '<h2 class="aw-sec-title">My Scores</h2>'+
      '<div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:14px">'+
        '<select class="aw-select" id="pMode"><option value="">All modes</option><option value="inclass">In-class</option><option value="homework">Homework</option><option value="free">Free Writing</option></select>'+
        '<div class="aw-search" style="flex:1;min-width:180px">'+AW.icon('search')+'<input id="pSearch" placeholder="Search topic…"></div>'+
        '<select class="aw-select" id="pSort"><option value="latest">Sort: Latest</option><option value="best">Sort: Best band</option><option value="topic">Sort: Topic</option></select>'+
      '</div>'+
      '<div id="progressBox"></div>';
    document.getElementById('pSearch').oninput=renderProgress;
    document.getElementById('pMode').onchange=renderProgress;
    document.getElementById('pSort').onchange=function(){_progressSort=this.value;renderProgress();};
    renderProgress();
  });
}
function renderProgress(){
  var box=document.getElementById('progressBox'); if(!box)return;
  var q=(document.getElementById('pSearch').value||'').toLowerCase();
  var mode=document.getElementById('pMode').value;
  var modeLabel={free:'Free Writing',homework:'Homework',inclass:'In-class'};
  var rows=(window._myGroups||[]).filter(function(g){
    if(mode && g.mode!==mode) return false;
    if(q && (g.topic||'').toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  if(_progressSort==='best') rows.sort(function(a,b){return (parseFloat(b.bestResult)||0)-(parseFloat(a.bestResult)||0);});
  else if(_progressSort==='topic') rows.sort(function(a,b){return (a.topic||'').localeCompare(b.topic||'');});
  else rows.sort(function(a,b){return new Date(b.latestTime)-new Date(a.latestTime);});

  if(!rows.length){box.innerHTML='<div class="aw-empty">'+AW.icon('progress')+'<p>No matching submissions.</p></div>';return;}

  function scoreCell(w,gi,wi,cl){
    cl=cl||'';
    if(!w) return '<td class="'+cl+'">—</td><td class="'+cl+'">—</td><td class="'+cl+'">—</td><td class="'+cl+'">—</td>';
    function tm(x){if(!x)return '—';var d=new Date(x);return isNaN(d)?x:(d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'));}
    function du(s){if(!s)return '—';s=parseInt(s,10);if(isNaN(s))return '—';var m=Math.floor(s/60);return m+'m';}
    var o=w.overall||w.teacher||'—';
    var pop='TR '+(w.tr||'—')+' · CC '+(w.cc||'—')+' · LR '+(w.lr||'—')+' · GRA '+(w.gra||'—');
    return '<td class="'+cl+'">'+tm(w.startTime)+'</td><td class="'+cl+'">'+tm(w.finishTime)+'</td><td class="'+cl+'">'+du(w.duration)+'</td>'+
      '<td class="'+cl+'"><span class="p-score" data-gi="'+gi+'" data-wi="'+wi+'" title="Click to review">'+o+'<small>/9</small><span class="p-pop">'+pop+'</span></span></td>';
  }
  var writeLabels=[['First Write','pg-1'],['Second Write','pg-2'],['Third Write','pg-3'],['★ Best','pg-b']];
  var top='<tr><th rowspan="2">Assigned / Deadline</th><th rowspan="2">Title</th><th rowspan="2">Prompt (đề bài)</th><th rowspan="2">Mode</th>';
  writeLabels.forEach(function(l){top+='<th colspan="4" class="'+l[1]+'">'+l[0]+'</th>';});
  top+='<th rowspan="2" class="pg-b">Attempt & Teacher Score</th><th rowspan="2"></th></tr><tr>';
  writeLabels.forEach(function(l){top+='<th class="'+l[1]+'">Start</th><th class="'+l[1]+'">Finish</th><th class="'+l[1]+'">Dur</th><th class="'+l[1]+'">Band</th>';});
  top+='</tr>';

  var body=rows.map(function(g){
    var gi=(window._myGroups||[]).indexOf(g);
    var w=g.writes||[];
    var best=null,bestI=-1;
    w.forEach(function(x,xi){var v=parseFloat(x.overall);if(!isNaN(v)&&(best===null||v>parseFloat(best.overall))){best=x;bestI=xi;}});
    var picks=[w[0],w[1],w[2],best];
    var idxs=[0,1,2,bestI];
    var groups=['pg-1','pg-2','pg-3','pg-b'];
    var assigned=g.assignedDate?new Date(g.assignedDate).toLocaleDateString('en-GB'):'—';
    var deadline=g.deadline?new Date(g.deadline).toLocaleDateString('en-GB'):'';
    var dateCell='<div style="font-size:.78rem;line-height:1.5">'+
      '<div style="color:var(--aw-writing);font-weight:700">'+assigned+'</div>'+
      '<div style="font-size:.68rem;color:var(--aw-ink-3)">Assigned</div>'+
      (deadline?'<div style="color:var(--aw-danger);margin-top:4px">'+deadline+'</div><div style="font-size:.68rem;color:var(--aw-ink-3)">Deadline</div>':'')+
    '</div>';
    var ts=g.teacherScore;
    // teacher scoring cell — blank hint if not graded
    var teacherCell;
    if(ts && (ts.overall||ts.tr||ts.cc||ts.lr||ts.gra||ts.privateNote)){
      teacherCell='<div style="font-size:.76rem;line-height:1.5;width:210px"><b>'+w.length+'/3</b> attempts'+
        '<div style="margin-top:4px;padding-top:4px;border-top:1px solid var(--aw-border-2)">'+
        (ts.overall?'<div style="margin-bottom:2px"><b style="color:var(--aw-primary);font-size:.9rem">Teacher: '+ts.overall+'</b></div>':'')+
        ((ts.tr||ts.cc||ts.lr||ts.gra)?'<div style="color:var(--aw-ink-2)">TR '+(ts.tr||'—')+' · CC '+(ts.cc||'—')+' · LR '+(ts.lr||'—')+' · GRA '+(ts.gra||'—')+'</div>':'')+
        (ts.privateNote?'<div style="margin-top:5px;padding:6px;background:#EAF6EF;border-radius:6px;color:var(--aw-ink-2);white-space:normal;word-break:break-word"><b>💬 Teacher note:</b><br>'+AW.esc(ts.privateNote)+'</div>':'')+
        '</div></div>';
    } else {
      teacherCell='<div style="font-size:.76rem;line-height:1.5;width:200px"><b>'+w.length+'/3</b> attempts'+
        '<div style="margin-top:4px;color:var(--aw-ink-3);font-style:italic">Not graded by teacher yet</div></div>';
    }
    var promptPlain = g.prompt ? (AW.stripHtml?AW.stripHtml(g.prompt):g.prompt.replace(/<[^>]*>/g,' ')) : '';
    var tds='<td>'+dateCell+'</td>'+
      '<td style="text-align:left;white-space:normal;word-break:break-word;min-width:150px;max-width:200px"><b>'+AW.esc(g.topic||'')+'</b></td>'+
      '<td style="text-align:left;white-space:normal;word-break:break-word;min-width:220px;max-width:300px;font-size:.82rem;color:var(--aw-ink-2)">'+AW.esc(promptPlain)+'</td>'+
      '<td><span class="aw-tag aw-tag-type" style="font-size:.7rem">'+AW.esc(modeLabel[g.mode]||g.mode)+'</span></td>';
    picks.forEach(function(p,pi){ tds+=scoreCell(p,gi,idxs[pi],groups[pi]); });
    tds+='<td class="pg-b">'+teacherCell+'</td>';
    tds+='<td><button class="aw-btn aw-btn-ghost" style="padding:4px 10px;font-size:.75rem" onclick="retryFromProgress(\''+AW.esc(g.mode)+'\',\''+AW.esc(g.topicId)+'\',\''+AW.esc(g.topic)+'\')">Re-try</button></td>';
    return '<tr>'+tds+'</tr>';
  }).join('');

  box.innerHTML='<p style="font-size:.82rem;color:var(--aw-ink-3);margin:0 0 10px">💡 Click any <b>Band</b> score to review that attempt.</p>'+
    '<div class="p-res-wrap" style="overflow-x:auto"><table class="p-res-table"><thead>'+top+'</thead><tbody>'+body+'</tbody></table></div>';
  AW.els('.p-score').forEach(function(c){
    c.onclick=function(){ reviewGroupWrite(+c.dataset.gi,+c.dataset.wi); };
  });
}
window.reviewGroupWrite=function(gi,wi){
  var g=(window._myGroups||[])[gi]; if(!g)return;
  var w=(g.writes||[])[wi]; if(!w){AW.toast('You have not completed this attempt yet.','ok');return;}
  // build a flat record for reviewFeedback
  window._myResults=window._myResults||[];
  var rec={topic:g.topic,topicId:g.topicId,mode:g.mode,attempt:w.attempt,
    overall:w.overall,tr:w.tr,cc:w.cc,lr:w.lr,gra:w.gra,duration:w.duration,
    timestamp:w.timestamp,essay:w.essay,feedback:w.feedback};
  window._reviewRec=rec;
  reviewFeedbackRec(rec,gi);
};
window.retryFromProgress=function(mode,topicId,topic){
  location.href='write.html?mode='+encodeURIComponent(mode)+'&retry=1&topicId='+encodeURIComponent(topicId)+'&topic='+encodeURIComponent(topic);
};
window.reviewFeedback=function(i){
  var r=(window._myResults||[])[i]; if(!r)return;
  reviewFeedbackRec(r,i);
};
function reviewFeedbackRec(r, refIdx){
  var i=refIdx;
  var fb=null, parseError=false;
  if(r.feedback && String(r.feedback).trim()){
    try{ fb=JSON.parse(r.feedback); }
    catch(e){ fb=null; parseError=true; console.warn('Feedback parse failed:',e,r.feedback&&r.feedback.slice(0,120)); }
  }
  window._reviewRec=r;
  // if no stored feedback (older submission), show essay + scores only
  if(!fb){
    var noticeMsg = parseError
      ? 'The stored feedback for this attempt could not be read (data format issue). Score and essay are shown below.'
      : 'This attempt has no stored AI feedback yet. This happens for submissions made before feedback storage was enabled, or if the tab was reset. New submissions show full feedback here.';
    var bodyNoFb='<div id="reviewContent">'+
      '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'+
        '<div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0A6EBD,#0A93BD);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff"><b style="font-size:1.5rem">'+(r.overall||'—')+'</b><span style="font-size:.5rem">BAND</span></div>'+
        '<div><b>'+AW.esc(r.topic||'')+'</b><p style="margin:2px 0 0;font-size:.82rem;color:#667">TR '+(r.tr||'—')+' · CC '+(r.cc||'—')+' · LR '+(r.lr||'—')+' · GRA '+(r.gra||'—')+'</p></div>'+
      '</div>'+
      '<div class="rv-block" style="background:#FFF8EC"><p style="margin:0">'+noticeMsg+'</p></div>'+
      (r.essay?'<div class="rv-block"><h4>Your essay</h4><div style="white-space:pre-wrap;font-size:.88rem;line-height:1.6;color:#334">'+AW.esc(r.essay)+'</div></div>':'<div class="rv-block"><p style="color:#889">No essay text stored.</p></div>')+
    '</div>';
    document.getElementById('reviewModalBody').innerHTML=
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
        '<h2 style="margin:0;font-family:var(--aw-font-display);font-size:1.3rem">Submission Review</h2>'+
        '<div><button class="aw-btn aw-btn-ghost" style="padding:6px 14px;margin-right:6px" onclick="exportReviewPDF()">⤓ Print/PDF</button>'+
        '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="closeReview()">Close</button></div>'+
      '</div>'+bodyNoFb;
    document.getElementById('reviewModal').classList.add('show');
    return;
  }
  var s=fb.scores||{};
  function crit(name,val){var pct=val?Math.min(100,(parseFloat(val)/9)*100):0;
    return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.85rem"><span>'+name+'</span><b>'+(val||'—')+'</b></div><div style="height:6px;background:#E5E9EE;border-radius:4px"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#0A6EBD,#0A93BD);border-radius:4px"></div></div></div>';}
  var body='<div id="reviewContent">'+
    '<div style="display:flex;align-items:center;gap:14px;margin-bottom:16px">'+
      '<div style="width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,#0A6EBD,#0A93BD);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff"><b style="font-size:1.5rem">'+(fb.overall||'—')+'</b><span style="font-size:.5rem">BAND</span></div>'+
      '<div><b>'+AW.esc(fb.band_description||'')+'</b><p style="margin:2px 0 0;font-size:.82rem;color:#667">'+AW.esc(r.topic||'')+' · Attempt '+(r.attempt||1)+'</p></div>'+
    '</div>'+
    crit('Task Response',s.TR)+crit('Coherence & Cohesion',s.CC)+crit('Lexical Resource',s.LR)+crit('Grammar',s.GRA)+
    (fb.overall_feedback_vi?'<div class="rv-block"><h4>Overall assessment</h4><p>'+AW.esc(fb.overall_feedback_vi)+'</p></div>':'')+
    (fb.repeated_errors_vi?'<div class="rv-block" style="background:#FFF8EC"><h4>⚠ Repeated errors</h4><p>'+AW.esc(fb.repeated_errors_vi)+'</p></div>':'')+
    ((fb.gra_errors||[]).length?'<div class="rv-block"><h4>Grammar</h4>'+fb.gra_errors.slice(0,10).map(function(e){return '<p><span style="color:#EA4335;text-decoration:line-through">'+AW.esc(e.wrong)+'</span> → <span style="color:#1E7E42;font-weight:600">'+AW.esc(e.correct)+'</span>'+(e.explanation_vi?'<br><span style="font-size:.8rem;color:#667">'+AW.esc(e.explanation_vi)+'</span>':'')+'</p>';}).join('')+'</div>':'')+
    ((fb.lr_issues||[]).length?'<div class="rv-block"><h4>Lexical Resource</h4>'+fb.lr_issues.slice(0,8).map(function(e){return '<p><span style="color:#EA4335;text-decoration:line-through">'+AW.esc(e.original)+'</span> → <span style="color:#1E7E42;font-weight:600">'+AW.esc(e.better)+'</span>'+(e.explanation_vi?'<br><span style="font-size:.8rem;color:#667">'+AW.esc(e.explanation_vi)+'</span>':'')+'</p>';}).join('')+'</div>':'')+
    (fb.cc_feedback&&fb.cc_feedback.assessment_vi?'<div class="rv-block"><h4>Coherence & Cohesion</h4><p>'+AW.esc(fb.cc_feedback.assessment_vi)+'</p></div>':'')+
    (r.essay?'<div class="rv-block"><h4>Your essay</h4><div style="white-space:pre-wrap;font-size:.88rem;line-height:1.6;color:#334">'+AW.esc(r.essay)+'</div></div>':'')+
  '</div>';
  document.getElementById('reviewModalBody').innerHTML=
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">'+
      '<h2 style="margin:0;font-family:var(--aw-font-display);font-size:1.3rem">Feedback Review</h2>'+
      '<div style="display:flex;gap:6px;flex-wrap:wrap">'+
      '<button class="aw-btn aw-btn-accent" style="padding:6px 14px" onclick="exportGoogleDoc('+i+')">📄 Google Doc</button>'+
      '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="exportReviewPDF()">⤓ PDF</button>'+
      '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="shareReview('+i+')">🔗 Share</button>'+
      '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="openDiscuss('+i+')">💬 Ask teacher</button>'+
      '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="closeReview()">Close</button></div>'+
    '</div>'+body;
  document.getElementById('reviewModal').classList.add('show');
};
// ── Share feedback as link or PDF ──
window.shareReview=function(i){
  var r=window._reviewRec||(window._myResults||[])[i]; if(!r)return;
  var summary='ArticuWrite Feedback — '+(r.topic||'')+'\nBand '+(r.overall||'—')+
    ' (TR '+(r.tr||'—')+' · CC '+(r.cc||'—')+' · LR '+(r.lr||'—')+' · GRA '+(r.gra||'—')+')';
  // prefer a Google Doc link (shareable), fall back to native share / clipboard
  AW.toast('Preparing shareable link…');
  AW.api('write.exportDoc',{studentId:sess.studentId,topicId:r.topicId,mode:r.mode}).then(function(res){
    if(res&&res.success&&res.data.url){
      var link=res.data.url;
      if(navigator.share){
        navigator.share({title:'ArticuWrite Feedback',text:summary,url:link}).catch(function(){});
      } else {
        navigator.clipboard.writeText(summary+'\n'+link).then(function(){
          AW.toast('Link copied! Paste into Zalo/Teams.','ok',4000);
        });
      }
    } else {
      AW.toast('Could not create link. Use PDF instead.','err');
    }
  });
};
// ── Discuss / report a specific feedback error to the teacher ──
window.openDiscuss=function(i){
  var r=window._reviewRec||(window._myResults||[])[i]; if(!r)return;
  var bg=document.getElementById('discussModal');
  bg.querySelector('.dm-body').innerHTML=
    '<h2 style="margin:0 0 4px;font-family:var(--aw-font-display);font-size:1.25rem">💬 Ask your teacher</h2>'+
    '<p style="margin:0 0 16px;color:var(--aw-ink-2);font-size:.88rem">Not sure about a correction the AI made? Ask your teacher about a specific point. Only your teacher will see this (unless they choose to share it with the class).</p>'+
    '<div class="aw-field"><label class="aw-label">Which AI correction / error? (optional)</label>'+
      '<input class="aw-input" id="dmError" placeholder="e.g. AI marked \'why this occurring\' as wrong"></div>'+
    '<div class="aw-field"><label class="aw-label">Your question</label>'+
      '<textarea class="aw-input" id="dmQuestion" rows="4" placeholder="e.g. In our lesson we were allowed to use simple present here — is this really an error?"></textarea></div>'+
    '<div style="display:flex;gap:10px;justify-content:flex-end">'+
      '<button class="aw-btn aw-btn-ghost" onclick="document.getElementById(\'discussModal\').classList.remove(\'show\')">Cancel</button>'+
      '<button class="aw-btn aw-btn-primary" id="dmSend">Send to teacher</button></div>';
  bg.classList.add('show');
  document.getElementById('dmSend').onclick=function(){
    var q=document.getElementById('dmQuestion').value.trim();
    if(!q){AW.toast('Please type your question','err');return;}
    var btn=this;btn.disabled=true;btn.textContent='Sending…';
    AW.api('query.create',{
      class:sess.class, studentId:sess.studentId, studentName:sess.name,
      mode:r.mode, topic:r.topic, topicId:r.topicId, attempt:r.attempt,
      errorQuote:document.getElementById('dmError').value.trim(), question:q
    }).then(function(res){
      if(res&&res.success){ AW.toast('Sent to your teacher','ok'); bg.classList.remove('show'); }
      else AW.toast('Failed to send','err');
    }).finally(function(){btn.disabled=false;btn.textContent='Send to teacher';});
  };
};
window.closeReview=function(){document.getElementById('reviewModal').classList.remove('show');};
window.exportGoogleDoc=function(i){
  var r=window._reviewRec||(window._myResults||[])[i]; if(!r)return;
  AW.toast('Creating Google Doc… (this may take a moment)');
  AW.api('write.exportDoc',{studentId:sess.studentId,topicId:r.topicId,mode:r.mode}).then(function(res){
    if(res&&res.success){
      AW.toast('Doc created!','ok');
      window.open(res.data.url,'_blank');
    } else AW.toast((res&&res.error)||'Export failed','err',4000);
  });
};
window.exportReviewPDF=function(){
  var el=document.getElementById('reviewContent');
  var w=window.open('','_blank');
  w.document.write('<html><head><title>ArticuWrite Feedback</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:720px;margin:30px auto;padding:0 20px;color:#10222E}h4{color:#0A6EBD;margin:16px 0 6px;font-size:.9rem;text-transform:uppercase}.rv-block{margin-top:12px;padding-top:12px;border-top:1px solid #E5E9EE}p{line-height:1.5;font-size:.9rem}</style></head><body><h1 style="color:#0A6EBD">ArticuWrite — Feedback</h1>'+el.innerHTML+'<p style="margin-top:30px;font-size:.75rem;color:#889">Generated by ArticuWrite · '+new Date().toLocaleString('vi-VN')+'</p></body></html>');
  w.document.close();
  setTimeout(function(){w.print();},400);
};

function showQA(){
  document.getElementById('awPageTitle').textContent='Q&A with Teacher';
  content.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div>';
  AW.api('query.listForStudent',{studentId:sess.studentId,class:sess.class}).then(function(res){
    var rows=(res&&res.data)||[];
    if(!rows.length){content.innerHTML='<div class="aw-empty">'+AW.icon('results')+'<p>No questions yet. When reviewing feedback, use "💬 Ask teacher" to ask about any AI correction.</p></div>';return;}
    var mine=rows.filter(function(q){return String(q.studentId)===String(sess.studentId);});
    var faq=rows.filter(function(q){return String(q.studentId)!==String(sess.studentId)&&q.shared;});
    var html='<h2 class="aw-sec-title">My Questions</h2>';
    html+= mine.length? mine.map(qaCard).join('') : '<p style="color:var(--aw-ink-3)">You haven\'t asked anything yet.</p>';
    if(faq.length){
      html+='<h2 class="aw-sec-title" style="margin-top:24px">📌 Class FAQ <span style="font-weight:400;font-size:.85rem;color:var(--aw-ink-3)">(shared by your teacher)</span></h2>';
      html+=faq.map(qaCard).join('');
    }
    content.innerHTML=html;
  });
}
function qaCard(q){
  var answered=q.status==='answered';
  return '<div style="border:1px solid var(--aw-border-2);border-radius:14px;padding:16px 18px;margin-bottom:12px;background:'+(answered?'#fff':'#FFF8EC')+'">'+
    '<div style="font-size:.8rem;color:var(--aw-ink-3);margin-bottom:6px">'+AW.esc(q.topic||'')+(q.attempt?' · Attempt '+AW.esc(q.attempt):'')+'</div>'+
    (q.errorQuote?'<div style="font-size:.85rem;background:var(--aw-surface-2);border-radius:8px;padding:6px 10px;margin-bottom:8px"><b>Re:</b> '+AW.esc(q.errorQuote)+'</div>':'')+
    '<p style="margin:0 0 10px"><b>Q:</b> '+AW.esc(q.question)+'</p>'+
    (answered
      ? '<div style="background:#EAF6EF;border-radius:8px;padding:10px 12px;font-size:.9rem"><b style="color:var(--aw-writing)">Teacher:</b> '+AW.esc(q.answer)+'</div>'
      : '<div style="font-size:.85rem;color:var(--aw-accent-dk);font-style:italic">Waiting for your teacher to answer…</div>')+
  '</div>';
}

function showSettings(){
  document.getElementById('awPageTitle').textContent='Settings';
  var hasKey=!!AW.geminiKey.get();
  // Control classes have no AI features, so the key fields would only confuse
  var keyCards = !AW_AI_ON ? '' : (
    '<div class="aw-card" style="padding:24px;max-width:520px;margin-bottom:16px">' +
      '<h3 style="margin:0 0 6px">Gemini API Key</h3>' +
      '<p style="color:var(--aw-ink-2);font-size:.9rem;margin:0 0 14px">Stored on your device, never sent to the server. Needed for AI grading.</p>' +
      '<div class="aw-pass-wrap" style="margin-bottom:6px"><input class="aw-input" id="keyIn" type="password" placeholder="'+(hasKey?'•••••••• (saved)':'AIza…')+'"></div>' +
      '<p style="margin:0 0 12px"><a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener" style="font-size:.8rem;color:var(--aw-primary);font-weight:600;text-decoration:none">→ Get a free Gemini key at Google AI Studio</a></p>' +
      '<button class="aw-btn aw-btn-primary" id="keyBtn">Save key</button>' +
      (hasKey?' <button class="aw-btn aw-btn-ghost" id="keyClear">Remove</button>':'') +
    '</div>' +
    '<div class="aw-card" style="padding:24px;max-width:520px;margin-bottom:16px">' +
      '<h3 style="margin:0 0 6px">Groq API Key <span style="font-size:.78rem;font-weight:400;color:var(--aw-ink-3)">(optional — AI Tutor in Free Writing)</span></h3>' +
      '<p style="color:var(--aw-ink-2);font-size:.9rem;margin:0 0 14px">Stored on your device. Used only for the Free Writing AI Tutor chat.</p>' +
      '<div class="aw-pass-wrap" style="margin-bottom:6px"><input class="aw-input" id="gqIn" type="password" placeholder="'+(AW.groqKey.get()?'•••••••• (saved)':'gsk_…')+'"></div>' +
      '<p style="margin:0 0 12px"><a href="https://console.groq.com/keys" target="_blank" rel="noopener" style="font-size:.8rem;color:var(--aw-primary);font-weight:600;text-decoration:none">→ Get a free Groq key</a></p>' +
      '<button class="aw-btn aw-btn-primary" id="gqBtn">Save key</button>' +
      (AW.groqKey.get()?' <button class="aw-btn aw-btn-ghost" id="gqClear">Remove</button>':'') +
    '</div>');
  content.innerHTML=
    keyCards +
    '<div class="aw-card" style="padding:24px;max-width:520px">' +
      '<h3 style="margin:0 0 14px">Change Password</h3>' +
      '<div class="aw-field"><label class="aw-label">Current password</label><input class="aw-input" id="pwOld" type="password"></div>' +
      '<div class="aw-field"><label class="aw-label">New password</label><input class="aw-input" id="pwNew" type="password"></div>' +
      '<div class="aw-field"><label class="aw-label">Confirm new password</label><input class="aw-input" id="pwNew2" type="password"></div>' +
      '<button class="aw-btn aw-btn-primary" id="pwBtn">Update password</button>' +
    '</div>';
  var keyBtn=document.getElementById('keyBtn');
  if(keyBtn) keyBtn.onclick=function(){
    var k=document.getElementById('keyIn').value.trim();
    if(k){AW.geminiKey.set(k);AW.toast('API key saved','ok');showSettings();}
  };
  var clr=document.getElementById('keyClear');
  if(clr)clr.onclick=function(){AW.geminiKey.set('');AW.toast('Key removed','ok');showSettings();};
  var gqBtn=document.getElementById('gqBtn');
  if(gqBtn) gqBtn.onclick=function(){
    var k=document.getElementById('gqIn').value.trim();
    if(k){AW.groqKey.set(k);AW.toast('Groq key saved','ok');showSettings();}
  };
  var gclr=document.getElementById('gqClear');
  if(gclr)gclr.onclick=function(){AW.groqKey.set('');AW.toast('Groq key removed','ok');showSettings();};
  document.getElementById('pwBtn').onclick=function(){
    var o=document.getElementById('pwOld').value, n=document.getElementById('pwNew').value, n2=document.getElementById('pwNew2').value;
    if(!o||!n){AW.toast('Please fill all fields.','err');return;}
    if(n!==n2){AW.toast('New passwords do not match.','err');return;}
    AW.api('auth.changePassword',{studentId:sess.studentId,oldPass:o,newPass:n}).then(function(res){
      if(res&&res.success)AW.toast('Password changed','ok');
      else AW.toast((res&&res.error)||'Failed','err');
    });
  };
}

/*──────── deep-link routing ────────
  Other pages (e.g. board.html) link back here with a hash, so honour it
  instead of always dropping the student on Practice Modes. */
function routeFromHash(){
  var h=(location.hash||'').replace('#','');
  if(h==='progress'){ showProgress(); AW.setActiveNav('progress'); }
  else if(h==='qa'){ showQA(); AW.setActiveNav('qa'); }
  else if(h==='settings'){ showSettings(); AW.setActiveNav('settings'); }
  else { showModes(); AW.setActiveNav('modes'); }   // '' or 'modes'
}
window.addEventListener('hashchange', routeFromHash);
AW.loadClassAI(sess.class, function(on){
  AW_AI_ON = on;
  routeFromHash();
});
</script>
