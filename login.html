<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
</head>
<body>
<div class="aw-auth-wrap">
  <div class="aw-auth-card">
    <div class="aw-auth-head">
      <div style="display:flex;justify-content:center" id="brand"></div>
      <h1 class="aw-auth-title" id="title">Welcome back</h1>
      <p class="aw-auth-sub" id="sub">Log in to continue your writing journey.</p>
    </div>

    <!-- role switch -->
    <div class="aw-role-switch" id="roleSwitch">
      <button class="aw-role active" data-role="student">Student</button>
      <button class="aw-role" data-role="teacher">Teacher</button>
    </div>

    <form id="form" autocomplete="on">
      <!-- student uses Student ID, teacher uses email -->
      <div class="aw-field" id="idField">
        <label class="aw-label" id="idLabel">Student ID</label>
        <input class="aw-input" id="idInput" placeholder="e.g. 1234567" autocomplete="username">
      </div>
      <div class="aw-field">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="aw-label" for="pw">Password</label>
          <button type="button" class="aw-pass-toggle" id="pwToggle">show</button>
        </div>
        <div class="aw-pass-wrap">
          <input class="aw-input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>

      <button class="aw-btn aw-btn-primary aw-btn-block" id="submit" type="submit" style="margin-top:8px">Log in</button>
    </form>

    <p class="aw-auth-alt">
      Don't have an account? <a href="signup.html" id="signupLink">Sign up</a>
    </p>
  </div>
</div>

<style>
  .aw-role-switch{display:flex;gap:6px;background:var(--aw-surface-2);border:1px solid var(--aw-border);
    border-radius:var(--aw-r-pill);padding:4px;margin-bottom:22px}
  .aw-role{flex:1;border:none;background:transparent;padding:9px;border-radius:var(--aw-r-pill);
    font-family:var(--aw-font-body);font-weight:600;font-size:.9rem;color:var(--aw-ink-2);cursor:pointer;transition:all .15s}
  .aw-role.active{background:var(--aw-primary);color:#fff;box-shadow:var(--aw-shadow-sm)}
</style>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i file HTML n&agrave;y tr&ecirc;n GitHub. Upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

  document.getElementById('brand').innerHTML = AW.brandLockup();

  var role = 'student';
  var idLabel = document.getElementById('idLabel');
  var idInput = document.getElementById('idInput');
  var title = document.getElementById('title');
  var sub = document.getElementById('sub');

  // role switch
  AW.els('.aw-role').forEach(function(btn){
    btn.onclick = function(){
      AW.els('.aw-role').forEach(function(b){ b.classList.remove('active'); });
      btn.classList.add('active');
      role = btn.dataset.role;
      if (role === 'teacher') {
        idLabel.textContent = 'Email Address';
        idInput.placeholder = 'you@dnpu.edu.vn';
        idInput.type = 'email';
        title.textContent = 'Welcome back';
        sub.textContent = 'Log in to your teacher dashboard.';
      } else {
        idLabel.textContent = 'Student ID';
        idInput.placeholder = 'e.g. 1234567';
        idInput.type = 'text';
        title.textContent = 'Welcome back';
        sub.textContent = 'Log in to continue your writing journey.';
      }
    };
  });

  // password reveal
  var pw = document.getElementById('pw');
  document.getElementById('pwToggle').onclick = function(){
    var showing = pw.type === 'text';
    pw.type = showing ? 'password' : 'text';
    this.textContent = showing ? 'show' : 'hide';
  };

  // submit
  var submitBtn = document.getElementById('submit');
  document.getElementById('form').onsubmit = function(e){
    e.preventDefault();
    var id = idInput.value.trim();
    var pass = pw.value;
    if (!id || !pass) { AW.toast('Nhập đầy đủ thông tin đăng nhập.', 'err'); return; }

    submitBtn.disabled = true;
    var original = submitBtn.textContent;
    submitBtn.innerHTML = '<span class="aw-spin"></span>';

    var action = role === 'teacher' ? 'auth.teacherLogin' : 'auth.studentLogin';
    var payload = role === 'teacher'
      ? { email: id, password: pass }
      : { studentId: id, password: pass };

    AW.api(action, payload).then(function(res){
      if (res && res.success) {
        AW.session.set(Object.assign({ role: role }, res.data));
        AW.toast('Đăng nhập thành công', 'ok');
        setTimeout(function(){
          location.href = role === 'teacher' ? AW.TEACHER_HOME : AW.STUDENT_HOME;
        }, 500);
      } else {
        AW.toast((res && res.error) || 'Đăng nhập thất bại.', 'err');
        submitBtn.disabled = false; submitBtn.textContent = original;
      }
    }).catch(function(){
      AW.toast('Không kết nối được máy chủ. Kiểm tra mạng.', 'err');
      submitBtn.disabled = false; submitBtn.textContent = original;
    });
  };

  // if already logged in, skip
  (function(){
    var s = AW.session.get();
    if (s && s.role) location.href = s.role === 'teacher' ? AW.TEACHER_HOME : AW.STUDENT_HOME;
  })();
</script>
</body>
</html>
