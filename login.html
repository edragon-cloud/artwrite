<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Đăng nhập · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
</head>
<body>
<div class="aw-auth-wrap">
  <div class="aw-auth-card">
    <div class="aw-auth-head">
      <div style="display:flex;justify-content:center" id="brand"></div>
      <h1 class="aw-auth-title">Welcome back</h1>
      <p class="aw-auth-sub">Log in to continue your writing journey.</p>
    </div>

    <form id="form" autocomplete="on">
      <div class="aw-field">
        <label class="aw-label">Student ID</label>
        <input class="aw-input" id="idInput" placeholder="e.g. 1234567" autocomplete="username">
      </div>
      <div class="aw-field">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <label class="aw-label" for="pw">Password</label>
          <button type="button" class="aw-pass-toggle" id="pwToggle">show</button>
        </div>
        <div class="aw-pass-wrap">
          <input class="aw-input" id="pw" type="password" placeholder="••••••••" autocomplete="current-password">
        </div>
      </div>
      <button class="aw-btn aw-btn-primary aw-btn-block" id="submit" type="submit" style="margin-top:8px">Log in</button>
    </form>

    <div style="text-align:right;margin-top:10px">
      <a href="#" id="forgotStu" style="font-size:.82rem;color:var(--aw-primary);text-decoration:none">Forgot password?</a>
    </div>

    <div style="border-top:1px solid var(--aw-border-2);margin:20px 0 16px"></div>

    <button class="aw-btn aw-btn-ghost aw-btn-block" id="teacherAccess">🎓 Teacher Access</button>

    <p class="aw-auth-alt" style="margin-top:16px">
      Don't have an account? <a href="signup.html">Sign up</a>
    </p>
  </div>
</div>

<!-- teacher login modal -->
<div class="aw-modal-bg" id="teacherModal">
  <div class="aw-auth-card" style="max-width:400px;margin:0">
    <div class="aw-auth-head">
      <h1 class="aw-auth-title" style="font-size:1.4rem">Teacher Access</h1>
      <p class="aw-auth-sub">Đăng nhập bằng email giảng viên.</p>
    </div>
    <div class="aw-field">
      <label class="aw-label">Email</label>
      <input class="aw-input" id="tEmail" type="email" placeholder="you@dnpu.edu.vn">
    </div>
    <div class="aw-field">
      <div style="display:flex;justify-content:space-between;align-items:center">
        <label class="aw-label" for="tPw">Password</label>
        <button type="button" class="aw-pass-toggle" id="tPwToggle">show</button>
      </div>
      <div class="aw-pass-wrap"><input class="aw-input" id="tPw" type="password" placeholder="••••••••"></div>
    </div>
    <button class="aw-btn aw-btn-primary aw-btn-block" id="tSubmit" style="margin-top:6px">Log in as Teacher</button>
    <div style="display:flex;justify-content:space-between;margin-top:12px">
      <a href="#" id="forgotTea" style="font-size:.82rem;color:var(--aw-primary);text-decoration:none">Forgot password?</a>
      <a href="#" id="tClose" style="font-size:.82rem;color:var(--aw-ink-3);text-decoration:none">Cancel</a>
    </div>
  </div>
</div>

<style>
  .aw-modal-bg{position:fixed;inset:0;background:rgba(16,34,46,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
  .aw-modal-bg.show{display:flex}
</style>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m c&ugrave;ng th&#432; m&#7909;c v&#7899;i file HTML tr&ecirc;n GitHub.</p></div>';
  throw new Error('aw-common.js not loaded');
}
document.getElementById('brand').innerHTML = AW.brandLockup();

// already logged in? skip
(function(){ var s=AW.session.get(); if(s&&s.role) location.href=s.role==='teacher'?AW.TEACHER_HOME:AW.STUDENT_HOME; })();

function togglePw(input, btn){ btn.onclick=function(){ var sh=input.type==='text'; input.type=sh?'password':'text'; btn.textContent=sh?'show':'hide'; }; }
togglePw(document.getElementById('pw'), document.getElementById('pwToggle'));
togglePw(document.getElementById('tPw'), document.getElementById('tPwToggle'));

// student login
var submitBtn=document.getElementById('submit');
document.getElementById('form').onsubmit=function(e){
  e.preventDefault();
  var id=document.getElementById('idInput').value.trim(), pass=document.getElementById('pw').value;
  if(!id||!pass){AW.toast('Nhập đầy đủ thông tin.','err');return;}
  submitBtn.disabled=true; var o=submitBtn.textContent; submitBtn.innerHTML='<span class="aw-spin"></span>';
  AW.api('auth.studentLogin',{studentId:id,password:pass}).then(function(res){
    if(res&&res.success){ AW.session.set(Object.assign({role:"student"},res.data)); AW.bumpLoginCount(); location.href=AW.STUDENT_HOME; }
    else { AW.toast((res&&res.error)||'Đăng nhập thất bại','err'); submitBtn.disabled=false; submitBtn.textContent=o; }
  }).catch(function(){ AW.toast('Không kết nối được máy chủ.','err'); submitBtn.disabled=false; submitBtn.textContent=o; });
};

// teacher modal
var tm=document.getElementById('teacherModal');
document.getElementById('teacherAccess').onclick=function(){ tm.classList.add('show'); };
document.getElementById('tClose').onclick=function(e){ e.preventDefault(); tm.classList.remove('show'); };
var tSubmit=document.getElementById('tSubmit');
tSubmit.onclick=function(){
  var email=document.getElementById('tEmail').value.trim(), pass=document.getElementById('tPw').value;
  if(!email||!pass){AW.toast('Nhập email và mật khẩu.','err');return;}
  tSubmit.disabled=true; var o=tSubmit.textContent; tSubmit.innerHTML='<span class="aw-spin"></span>';
  AW.api('auth.teacherLogin',{email:email,password:pass}).then(function(res){
    if(res&&res.success){ AW.session.set(Object.assign({role:"teacher"},res.data)); AW.bumpLoginCount(); location.href=AW.TEACHER_HOME; }
    else { AW.toast((res&&res.error)||'Đăng nhập thất bại','err'); tSubmit.disabled=false; tSubmit.textContent=o; }
  }).catch(function(){ AW.toast('Không kết nối được máy chủ.','err'); tSubmit.disabled=false; tSubmit.textContent=o; });
};

// forgot password (both)
function forgot(){
  var email=prompt('Nhập email đã đăng ký để nhận lại mật khẩu:');
  if(!email)return;
  AW.toast('Đang gửi email…');
  AW.api('auth.forgotPassword',{email:email.trim()}).then(function(res){
    if(res&&res.success) AW.toast('Đã gửi mật khẩu tới email của bạn.','ok',4000);
    else AW.toast((res&&res.error)||'Không gửi được.','err',4000);
  });
}
document.getElementById('forgotStu').onclick=function(e){e.preventDefault();forgot();};
document.getElementById('forgotTea').onclick=function(e){e.preventDefault();forgot();};
</script>
</body>
</html>
