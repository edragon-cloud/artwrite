<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
<style>
  /* live observation grid */
  .aw-live-wrap{display:grid;grid-template-columns:1fr 250px;gap:18px}
  @media(max-width:900px){.aw-live-wrap{grid-template-columns:1fr}}
  .aw-live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .aw-live-cell{background:var(--aw-surface);border:1.5px solid var(--aw-border-2);border-radius:var(--aw-r);padding:12px 10px;text-align:center;cursor:pointer;transition:transform .12s,border-color .14s,box-shadow .14s}
  .aw-live-cell:hover{transform:translateY(-2px);border-color:var(--aw-primary);box-shadow:var(--aw-shadow)}
  .aw-live-cell.sel{border-color:var(--aw-primary);box-shadow:var(--aw-ring)}
  .aw-live-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--aw-primary),#0A93BD);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.85rem;margin:0 auto 8px}
  .aw-live-name{font-size:.8rem;font-weight:600;color:var(--aw-ink);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .aw-live-status{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--aw-ink-2)}
  .aw-live-side{background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:16px;box-shadow:var(--aw-shadow-sm);align-self:start}
  .aw-live-side h4{margin:0 0 12px;font-size:.95rem}
  .aw-stat-row{display:flex;justify-content:space-between;font-size:.86rem;padding:6px 0;color:var(--aw-ink-2)}
  .aw-stat-row b{color:var(--aw-ink)}
  /* annotation modal */
  .aw-modal-bg{position:fixed;inset:0;background:rgba(16,34,46,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
  .aw-modal-bg.show{display:flex}
  .aw-modal{background:var(--aw-surface);border-radius:var(--aw-r-lg);width:100%;max-width:1000px;max-height:90vh;overflow:hidden;display:grid;grid-template-columns:1fr 300px;box-shadow:var(--aw-shadow-lg)}
  @media(max-width:800px){.aw-modal{grid-template-columns:1fr}}
  .aw-modal-doc{padding:24px;overflow-y:auto;max-height:90vh}
  .aw-modal-doc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .aw-doc-text{font-size:1rem;line-height:1.9;color:var(--aw-ink);white-space:pre-wrap;user-select:text;outline:none;min-height:200px;border:1px solid var(--aw-border-2);border-radius:var(--aw-r-sm);padding:16px}
  .aw-doc-text:focus{border-color:var(--aw-primary)}
  .aw-sug-del{color:var(--aw-danger);text-decoration:line-through;text-decoration-thickness:2px}
  .aw-sug-ins{color:var(--aw-writing);font-weight:600}
  .aw-hl{background:#FFF1A8;border-radius:2px;padding:0 1px}
  .aw-doc-comment{border-bottom:2px dotted var(--aw-accent);cursor:help}
  .aw-modal-side{background:var(--aw-surface-2);padding:20px;border-left:1px solid var(--aw-border-2);overflow-y:auto;max-height:90vh}
  .aw-modal-side h4{margin:0 0 12px;font-size:.95rem}
  .aw-suggest-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .aw-suggest{background:#FFF;border:1px solid var(--aw-border);border-radius:var(--aw-r-sm);padding:10px;font-size:.82rem}
  .aw-suggest .orig{color:var(--aw-danger);text-decoration:line-through}
  .aw-suggest .sug{color:var(--aw-writing);font-weight:600}
  .aw-score-input{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .aw-score-input label{width:40px;font-weight:600;font-size:.85rem}
  .aw-score-input input{width:60px;padding:6px 8px;border:1.5px solid var(--aw-border);border-radius:6px;text-align:center}
  .aw-sel-pop{position:fixed;z-index:600;background:var(--aw-primary-dk);border-radius:8px;padding:4px;display:none;gap:2px;box-shadow:var(--aw-shadow-lg)}
  .aw-sel-pop.show{display:flex}
  .aw-sel-pop button{background:none;border:none;color:#fff;padding:6px 10px;font-size:.8rem;cursor:pointer;border-radius:5px;font-family:var(--aw-font-body)}
  .aw-sel-pop button:hover{background:rgba(255,255,255,.15)}
  /* recent activity */
  .aw-two-col{display:grid;grid-template-columns:1fr 300px;gap:18px}
  @media(max-width:900px){.aw-two-col{grid-template-columns:1fr}}
  .aw-panel{background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:20px;box-shadow:var(--aw-shadow-sm)}
  .aw-tabs{display:flex;gap:4px;border-bottom:2px solid var(--aw-border-2);margin-bottom:18px}
  .aw-tab{padding:10px 18px;border:none;background:none;font-family:var(--aw-font-body);font-weight:600;font-size:.92rem;color:var(--aw-ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .aw-tab.active{color:var(--aw-primary);border-bottom-color:var(--aw-primary)}
  /* assignment modal */
  .aw-amodal{background:var(--aw-surface);border-radius:var(--aw-r-lg);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--aw-shadow-lg);padding:30px}
  .aw-amodal h2{font-family:var(--aw-font-display);margin:0 0 4px;font-size:1.4rem}
  .aw-editor-mini-tb{display:flex;gap:2px;padding:6px 8px;border:1px solid var(--aw-border);border-bottom:none;border-radius:var(--aw-r-sm) var(--aw-r-sm) 0 0;background:var(--aw-surface-2)}
  .aw-editor-mini-tb button{width:30px;height:30px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--aw-ink-2);font-weight:700}
  .aw-editor-mini-tb button:hover{background:var(--aw-primary-lt);color:var(--aw-primary)}
  .aw-prompt-edit{min-height:120px;border:1px solid var(--aw-border);border-radius:0 0 var(--aw-r-sm) var(--aw-r-sm);padding:12px 14px;font-family:var(--aw-font-body);font-size:.95rem;line-height:1.6;outline:none;overflow-y:auto}
  .aw-prompt-edit:focus{border-color:var(--aw-primary)}
  /* wide results table */
  .aw-res-table{width:100%;border-collapse:collapse;font-size:.85rem;white-space:nowrap}
  .aw-res-table th,.aw-res-table td{border:1px solid var(--aw-border-2);padding:8px 10px;text-align:center}
  .aw-res-table thead tr:first-child th{background:var(--aw-primary);color:#fff;font-family:var(--aw-font-display);font-size:.8rem}
  .aw-res-table thead tr:nth-child(2) th{background:var(--aw-surface-2);color:var(--aw-ink-2);font-size:.72rem;font-weight:600}
  .aw-res-table td.sticky,.aw-res-table th.sticky{position:sticky;left:0;background:var(--aw-surface);z-index:2;text-align:left}
  .aw-res-table tbody tr:hover td{background:var(--aw-surface-2)}
  .aw-res-overall{font-weight:700;cursor:help;position:relative;display:inline-block;padding:2px 8px;border-radius:6px}
  .aw-res-overall:hover .aw-res-pop{display:block}
  .aw-res-pop{display:none;position:absolute;bottom:130%;left:50%;transform:translateX(-50%);background:var(--aw-primary-dk);color:#fff;padding:8px 12px;border-radius:8px;font-size:.75rem;font-weight:500;white-space:nowrap;z-index:10;box-shadow:var(--aw-shadow-lg)}
  .aw-res-pop:after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--aw-primary-dk)}
</style>
</head>
<body>
<div id="app"></div>

<div class="aw-modal-bg" id="modalBg">
  <div class="aw-modal">
    <div class="aw-modal-doc">
      <div class="aw-modal-doc-head">
        <div><b id="mStudent">Student</b> <span style="color:var(--aw-ink-3)" id="mTopic"></span></div>
        <button class="aw-btn aw-btn-ghost" style="padding:6px 14px" id="mClose">Close</button>
      </div>
      <!-- annotation toolbar -->
      <div style="display:flex;gap:2px;flex-wrap:wrap;background:var(--aw-surface-2);border:1px solid var(--aw-border-2);border-radius:var(--aw-r-sm);padding:6px;margin-bottom:8px">
        <button class="aw-tbtn" id="annBold" title="Bold"><b>B</b></button>
        <button class="aw-tbtn" id="annItalic" title="Italic"><i>I</i></button>
        <button class="aw-tbtn" id="annUnder" title="Underline"><u>U</u></button>
        <span style="width:1px;background:var(--aw-border-2);margin:2px 4px;display:inline-block"></span>
        <button class="aw-tbtn" id="annSug" title="Suggest edit (red strike + green insert)">✎ Suggest</button>
        <button class="aw-tbtn" id="annStrike" title="Strike (delete suggestion)">S̶ Strike</button>
        <button class="aw-tbtn" id="annHl" title="Highlight">🖍</button>
        <button class="aw-tbtn" id="annComment" title="Comment">💬</button>
      </div>
      <div class="aw-doc-text" id="mText" contenteditable="false"></div>
      <p style="font-size:.78rem;color:var(--aw-ink-3);margin:10px 0 0">Bôi đen văn bản rồi dùng bộ nút trên để gợi ý sửa, highlight hoặc comment. Khi xong, bấm <b>Push to Student</b> để SV thấy nhận xét.</p>
    </div>
    <div class="aw-modal-side">
      <h4>Teacher Suggestions</h4>
      <p style="font-size:.8rem;color:var(--aw-ink-3);margin:0 0 12px">Gạch đỏ = sai · Xanh = gợi ý sửa</p>
      <div class="aw-suggest-list" id="suggestList"></div>
      <h4>Scoring (IELTS)</h4>
      <div class="aw-score-input"><label>TR</label><input type="number" id="sTR" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>CC</label><input type="number" id="sCC" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>LR</label><input type="number" id="sLR" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>GRA</label><input type="number" id="sGRA" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label><b>Overall</b></label><input type="number" id="sOverall" min="0" max="9" step="0.5"></div>
      <button class="aw-btn aw-btn-accent aw-btn-block" id="pushFb" style="margin-top:12px">⬆ Push to Student</button>
      <button class="aw-btn aw-btn-primary aw-btn-block" id="saveFb" style="margin-top:8px">✓ Submit & Save Score</button>
    </div>
  </div>
</div>

<div class="aw-sel-pop" id="selPop">
  <button id="popSuggest">✎ Suggest</button>
  <button id="popStrike">S̶ Strike</button>
  <button id="popHl">🖍 Highlight</button>
  <button id="popComment">💬 Comment</button>
</div>

<!-- assignment creation modal -->
<div class="aw-modal-bg" id="assignModal">
  <div class="aw-amodal">
    <h2 id="assignTitle">New Homework</h2>
    <p class="aw-auth-sub" style="margin:0 0 18px" id="assignSub">Giao bài cho lớp đang chọn.</p>
    <div class="aw-field"><label class="aw-label">Topic / Title</label>
      <input class="aw-input" id="aTopic" placeholder="VD: Day 1 — Advertising essay"></div>
    <div class="aw-field"><label class="aw-label">Prompt / Instructions</label>
      <div class="aw-editor-mini-tb">
        <button type="button" data-c="bold"><b>B</b></button>
        <button type="button" data-c="italic"><i>I</i></button>
        <button type="button" data-c="underline"><u>U</u></button>
        <button type="button" data-c="insertUnorderedList">•</button>
      </div>
      <div class="aw-prompt-edit" id="aPrompt" contenteditable="true" data-ph="Nhập đề bài, yêu cầu, tiêu chí… (xuống hàng & format thoải mái)"></div>
    </div>
    <div class="aw-row" style="display:flex;gap:12px">
      <div class="aw-field" style="flex:1" id="reqField"><label class="aw-label">Required revisions</label>
        <input class="aw-input" id="aReq" type="number" value="5" min="1"></div>
      <div class="aw-field" style="flex:1" id="durField" style="display:none"><label class="aw-label">Duration (min)</label>
        <input class="aw-input" id="aDur" type="number" value="40" min="5"></div>
      <div class="aw-field" style="flex:1" id="deadField"><label class="aw-label">Deadline</label>
        <input class="aw-input" id="aDead" type="date"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="aw-btn aw-btn-ghost" id="aCancel">Cancel</button>
      <button class="aw-btn aw-btn-primary" id="aCreate">Create & Assign</button>
    </div>
  </div>
</div>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i file HTML n&agrave;y tr&ecirc;n GitHub. Upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

var sess = AW.session.require('teacher');
if (!sess) throw 'redirect';

// selected class (persisted per teacher)
var CLASS_KEY = 'aw_teacher_class';
var myClasses = [];
function curClass(){ return localStorage.getItem(CLASS_KEY) || ''; }
function setCurClass(id){ localStorage.setItem(CLASS_KEY, id); }
function curClassObj(){ return myClasses.filter(function(c){return c.classId===curClass();})[0]||null; }

var nav = [
  { id:'overview',   label:'Class Overview', icon:'overview', active:true },
  { id:'live',       label:'Live Observation', icon:'live' },
  { id:'assignments',label:'Assignments', icon:'modes' },
  { id:'results',    label:'Results', icon:'results' },
  { id:'board',      label:'Interactive Board', icon:'modes', href:'board.html' },
  { id:'library',    label:'Library', icon:'library', href:'library.html' },
  { id:'settings',   label:'Settings', icon:'settings' },
];

var content = AW.renderShell({
  mount:'app', nav:nav, eyebrow:'Teacher Dashboard Interface', title:'Class Overview',
  onNav:function(id){
    stopLivePoll();
    if(!curClass() && id!=='settings'){ AW.toast('Tạo hoặc chọn một lớp trước.','err'); showClasses(); AW.setActiveNav('overview'); return; }
    if(id==='overview') showOverview();
    else if(id==='live') showLive();
    else if(id==='assignments') showAssignments();
    else if(id==='results') showResults();
    else if(id==='settings') showSettings();
    AW.setActiveNav(id);
  }
});

// class selector bar injected under topbar
function injectClassBar(){
  var old=document.getElementById('classBar'); if(old)old.remove();
  var bar=document.createElement('div');
  bar.id='classBar';
  bar.style.cssText='display:flex;align-items:center;gap:12px;padding:12px 30px;background:var(--aw-surface);border-bottom:1px solid var(--aw-border-2);flex-wrap:wrap';
  var opts=myClasses.map(function(c){
    return '<option value="'+AW.esc(c.classId)+'"'+(c.classId===curClass()?' selected':'')+'>'+AW.esc(c.className)+' ('+AW.esc(c.classId)+')</option>';
  }).join('');
  bar.innerHTML=
    '<span style="font-weight:600;font-size:.85rem;color:var(--aw-ink-2)">Class:</span>'+
    '<select class="aw-select" id="classSel"'+(myClasses.length?'':' disabled')+'>'+
      (myClasses.length?opts:'<option>No classes yet</option>')+'</select>'+
    (curClassObj()?'<span class="aw-tag aw-tag-type">'+AW.esc(curClassObj().year||'')+(curClassObj().semester?' · HK'+AW.esc(curClassObj().semester):'')+'</span>':'')+
    '<button class="aw-btn aw-btn-primary" style="margin-left:auto;padding:8px 16px" id="newClassBtn">+ Create New Class</button>';
  var main=document.querySelector('.aw-main');
  var topbar=main.querySelector('.aw-topbar');
  topbar.insertAdjacentElement('afterend', bar);
  var sel=document.getElementById('classSel');
  if(sel) sel.onchange=function(){ setCurClass(this.value); location.reload(); };
  document.getElementById('newClassBtn').onclick=showCreateClass;
}

/*═══════════ CLASSES ═══════════*/
function bootClasses(){
  AW.api('class.list',{teacherEmail:sess.email}).then(function(res){
    myClasses=(res&&res.data)||[];
    if(myClasses.length && !curClass()) setCurClass(myClasses[0].classId);
    injectClassBar();
    if(!myClasses.length){ showClasses(); }
    else { routeInitial(); }
  });
}

function showClasses(){
  document.getElementById('awPageTitle').textContent='My Classes';
  if(!myClasses.length){
    content.innerHTML='<div class="aw-empty">'+AW.icon('overview')+
      '<p>Bạn chưa có lớp nào. Tạo lớp đầu tiên để bắt đầu.</p>'+
      '<button class="aw-btn aw-btn-primary" style="margin-top:14px" onclick="showCreateClass()">+ Create New Class</button></div>';
    return;
  }
  content.innerHTML='<div class="aw-grid">'+myClasses.map(function(c){
    return '<div class="aw-lib-card" onclick="pickClass(\''+c.classId+'\')">'+
      '<h3 class="aw-lib-title">'+AW.esc(c.className)+'</h3>'+
      '<span class="aw-tag aw-tag-type">'+AW.esc(c.classId)+'</span> '+
      '<span class="aw-tag aw-tag-medium">'+AW.esc(c.year||'')+(c.semester?' · HK'+AW.esc(c.semester):'')+'</span>'+
      '<p class="aw-lib-desc">Mã lớp chia sẻ cho sinh viên: <b>'+AW.esc(c.classId)+'</b></p></div>';
  }).join('')+'</div>';
}
window.pickClass=function(id){ setCurClass(id); location.reload(); };

window.showCreateClass=function(){
  var name=prompt('Tên lớp (VD: IELTS Writing 01):'); if(!name)return;
  var year=prompt('Năm học (VD: 2026-2027):','2026-2027')||'';
  var sem=prompt('Học kỳ (1, 2 hoặc 3):','2')||'';
  AW.api('class.create',{className:name,year:year,semester:sem,teacherEmail:sess.email}).then(function(res){
    if(res&&res.success){
      AW.toast('Đã tạo lớp · Mã: '+res.data.classId,'ok',4000);
      setCurClass(res.data.classId);
      setTimeout(function(){location.reload();},800);
    } else AW.toast((res&&res.error)||'Tạo lớp thất bại','err');
  });
};

/*═══════════ OVERVIEW ═══════════*/
function showOverview(){
  document.getElementById('awPageTitle').textContent='Class Overview';
  content.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div>';
  AW.api('teacher.getOverview',{class:curClass()}).then(function(res){
    var d=(res&&res.data)||{avgScore:0,totalEssays:0,activeStudents:0,feedbackPending:0};
    content.innerHTML=
      '<div class="aw-kpi-row">' +
        kpi('Average Class Score', d.avgScore||'—') +
        kpi('Total Essays Submitted', d.totalEssays) +
        kpi('Active Students', d.activeStudents) +
        kpi('Feedback Pending', d.feedbackPending) +
      '</div>' +
      '<div class="aw-two-col">' +
        '<div class="aw-panel"><h3 style="margin:0 0 14px">Class Roster <span id="rosterCount" style="color:var(--aw-ink-3);font-weight:400;font-size:.85rem"></span></h3><div id="roster"></div></div>' +
        '<div class="aw-panel"><h3 style="margin:0 0 14px">Quick Actions</h3>' +
          '<button class="aw-btn aw-btn-primary aw-btn-block" style="margin-bottom:10px" onclick="document.querySelector(\'[data-nav=assignments]\').click()">+ New Assignment</button>' +
          '<button class="aw-btn aw-btn-ghost aw-btn-block" style="margin-bottom:10px" onclick="document.querySelector(\'[data-nav=live]\').click()">Go to Live Observation</button>' +
          '<button class="aw-btn aw-btn-ghost aw-btn-block" onclick="showClasses()">Manage Classes</button>' +
        '</div>' +
      '</div>';
    loadRecent();
    loadRoster();
  });
}
function kpi(label,val){return '<div class="aw-kpi"><div class="aw-kpi-label">'+label+'</div><div class="aw-kpi-value">'+val+'</div></div>';}
function loadRecent(){
  AW.api('teacher.getResults',{class:curClass(),mode:'homework'}).then(function(res){
    var rows=(res&&res.data)||[];
    var box=document.getElementById('recent');
    if(!box)return;
    if(!rows.length){box.innerHTML='<p style="color:var(--aw-ink-3);font-size:.88rem">No submissions yet.</p>';return;}
    box.innerHTML=rows.slice(-6).reverse().map(function(g){
      var last=g.writes[g.writes.length-1]||{};
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--aw-border-2);font-size:.88rem">'+
        '<span>'+AW.esc(g.name||g.studentId)+' — '+AW.esc(g.topic||'')+'</span>'+
        '<b class="'+AW.scoreClass(last.overall)+'">'+(last.overall||'—')+'</b></div>';
    }).join('');
  });
}
function loadRoster(){
  AW.api('class.roster',{class:curClass()}).then(function(res){
    var rows=(res&&res.data)||[];
    var box=document.getElementById('roster');
    var cnt=document.getElementById('rosterCount');
    if(!box)return;
    if(cnt)cnt.textContent='('+rows.length+' students)';
    if(!rows.length){box.innerHTML='<p style="color:var(--aw-ink-3);font-size:.88rem">Chưa có sinh viên nào đăng ký lớp này. Chia sẻ mã lớp <b>'+AW.esc(curClass())+'</b> cho sinh viên.</p>';return;}
    box.innerHTML=rows.map(function(s){
      return '<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--aw-border-2);font-size:.88rem">'+
        '<span><b>'+AW.esc(s.studentId)+'</b> · '+AW.esc(s.name||'')+'</span>'+
        '<span style="color:var(--aw-ink-3)">'+AW.esc(s.email||'')+'</span></div>';
    }).join('');
  });
}

/*═══════════ LIVE OBSERVATION ═══════════*/
var livePoll=null, liveSelected=null, liveData=[], liveTaskFilter='all';
function showLive(){
  document.getElementById('awPageTitle').textContent='Live Observation';
  // load inclass assignments for filter
  AW.api('write.getAssignments',{class:curClass(),mode:'inclass'}).then(function(res){
    var tasks=(res&&res.data)||[];
    var taskOpts='<option value="all">Tất cả bài In-class</option>'+
      tasks.map(function(t){return '<option value="'+AW.esc(t.topicId)+'">'+AW.esc(t.topic)+'</option>';}).join('');
    content.innerHTML=
      '<div style="display:flex;gap:12px;align-items:center;margin-bottom:16px;flex-wrap:wrap">'+
        '<select class="aw-select" id="liveTaskSel">'+taskOpts+'</select>'+
        '<span style="font-size:.82rem;color:var(--aw-ink-3)">Poll mỗi 6s · Click vào SV để xem bài & sửa</span>'+
      '</div>'+
      '<div class="aw-live-wrap">' +
        '<div><div id="liveGrid" class="aw-live-grid"><div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div></div></div>' +
        '<div class="aw-live-side"><h4>Session Stats</h4><div id="liveStats"></div>' +
          '<p style="font-size:.78rem;color:var(--aw-ink-3);margin-top:14px">Click a student to open their live essay and add suggestions.</p></div>' +
      '</div>';
    document.getElementById('liveTaskSel').onchange=function(){ liveTaskFilter=this.value; renderLive(); };
    pollLive();
    livePoll=setInterval(pollLive, 6000);
  });
}
function stopLivePoll(){ if(livePoll){clearInterval(livePoll);livePoll=null;} }
function pollLive(){
  AW.api('teacher.getLive',{class:curClass()}).then(function(res){
    // Live Observation only tracks students doing In-class Practice
    liveData=((res&&res.data)||[]).filter(function(s){ return s.mode==='inclass'; });
    renderLive();
  });
}
function renderLive(){
  var grid=document.getElementById('liveGrid'); if(!grid)return;
  var filtered = (liveTaskFilter==='all') ? liveData :
    liveData.filter(function(s){ return String(s.topicId)===String(liveTaskFilter); });
  if(!filtered.length){
    grid.innerHTML='<div class="aw-empty">'+AW.icon('live')+'<p>Chưa có sinh viên nào đang làm In-class Practice. Hãy tạo bài In-class trước.</p></div>';
    document.getElementById('liveStats').innerHTML='';return;
  }
  var counts={Writing:0,Idle:0,Offline:0,Submitted:0};
  grid.innerHTML=filtered.map(function(s){
    counts[s.status]=(counts[s.status]||0)+1;
    var dot=s.status==='Writing'?'writing':s.status==='Idle'?'idle':s.status==='Submitted'?'submitted':'offline';
    var init=(s.name||s.studentId).split(/\s+/).map(function(w){return w[0];}).slice(0,2).join('').toUpperCase();
    return '<div class="aw-live-cell'+(liveSelected===s.studentId?' sel':'')+'" data-sid="'+AW.esc(s.studentId)+'">' +
      '<div class="aw-live-av">'+AW.esc(init)+'</div>' +
      '<div class="aw-live-name">'+AW.esc(s.name||s.studentId)+'</div>' +
      '<div class="aw-live-status"><span class="aw-dot aw-dot-'+dot+'"></span>'+s.status+'</div></div>';
  }).join('');
  var totalWords=filtered.reduce(function(a,s){return a+(parseInt(s.wordCount)||0);},0);
  document.getElementById('liveStats').innerHTML=
    statRow('Writing',counts.Writing||0)+statRow('Idle',counts.Idle||0)+
    statRow('Offline',counts.Offline||0)+statRow('Submitted',counts.Submitted||0)+
    '<hr style="border:none;border-top:1px solid var(--aw-border-2);margin:10px 0">'+
    statRow('Total words',totalWords);
  AW.els('.aw-live-cell').forEach(function(c){
    c.onclick=function(){
      liveSelected=c.dataset.sid;
      var s=filtered.filter(function(x){return String(x.studentId)===String(liveSelected);})[0];
      if(s) openAnnotation(s);
    };
  });
}
function statRow(l,v){return '<div class="aw-stat-row"><span>'+l+'</span><b>'+v+'</b></div>';}

/*═══════════ ANNOTATION MODAL — Google-Docs-style inline editing ═══════════
  The doc is contentEditable. Selecting text + choosing a tool wraps the
  selection in a styled span (strikethrough + green insertion, highlight,
  or comment). Suggestions are also recorded in a structured list so they
  can be saved to the backend and reviewed.
─────────────────────────────────────────────────────────────────*/
var currentAnnot={ studentId:null, topicId:null, mode:null, suggestions:[] };
var mText=document.getElementById('mText');
var selPop=document.getElementById('selPop');
var savedRange=null;

function openAnnotation(s){
  currentAnnot={ studentId:s.studentId, topicId:s.topicId, mode:s.mode, suggestions:[] };
  document.getElementById('mStudent').textContent=s.name||s.studentId;
  document.getElementById('mTopic').textContent=s.topic?('· '+s.topic):'';
  mText.textContent=s.snapshot||'(chưa có nội dung)';
  mText.setAttribute('contenteditable','true');
  document.getElementById('suggestList').innerHTML='<p style="font-size:.8rem;color:var(--aw-ink-3)">Chưa có đề xuất nào.</p>';
  ['sTR','sCC','sLR','sGRA','sOverall'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('modalBg').classList.add('show');
  // wire toolbar buttons to trigger same actions as popup
  document.getElementById('annBold').onclick=function(){ document.execCommand('bold'); };
  document.getElementById('annItalic').onclick=function(){ document.execCommand('italic'); };
  document.getElementById('annUnder').onclick=function(){ document.execCommand('underline'); };
  document.getElementById('annSug').onclick=function(){ triggerAnnotation('suggest'); };
  document.getElementById('annStrike').onclick=function(){ triggerAnnotation('strike'); };
  document.getElementById('annHl').onclick=function(){ triggerAnnotation('highlight'); };
  document.getElementById('annComment').onclick=function(){ triggerAnnotation('comment'); };
}
function triggerAnnotation(type){
  // save current selection if any, or re-use savedRange
  var sel=window.getSelection();
  if(sel.rangeCount && sel.toString().trim()) savedRange=sel.getRangeAt(0).cloneRange();
  if(type==='suggest') document.getElementById('popSuggest').onclick();
  else if(type==='strike') document.getElementById('popStrike').onclick();
  else if(type==='highlight') document.getElementById('popHl').onclick();
  else if(type==='comment') document.getElementById('popComment').onclick();
}
// Push to Student — writes annotatedHtml back to LiveSessions snapshot
// so student can poll and see teacher's inline marks
document.getElementById('pushFb').onclick=function(){
  var btn=this; btn.disabled=true; var o=btn.innerHTML;
  btn.innerHTML='<span class="aw-spin"></span>';
  AW.api('teacher.saveAnnotation',{
    studentId:currentAnnot.studentId, topicId:currentAnnot.topicId, mode:currentAnnot.mode,
    teacher:sess.name||sess.email, suggestions:currentAnnot.suggestions,
    annotatedHtml: mText.innerHTML,
    tr:'', cc:'', lr:'', gra:'', note:'push', teacherGrading:''
  }).then(function(res){
    if(res&&res.success) AW.toast('Đã gửi nhận xét tới sinh viên','ok');
    else AW.toast('Gửi thất bại','err');
  }).finally(function(){ btn.disabled=false; btn.innerHTML=o; });
};
document.getElementById('mClose').onclick=function(){
  document.getElementById('modalBg').classList.remove('show');liveSelected=null;selPop.classList.remove('show');
};

// show popup on selection within the doc
mText.addEventListener('mouseup',function(e){
  var sel=window.getSelection();
  var txt=sel.toString().trim();
  if(txt && sel.rangeCount){
    savedRange=sel.getRangeAt(0).cloneRange();
    selPop.style.left=Math.max(8,e.clientX-40)+'px';
    selPop.style.top=Math.max(8,e.clientY-48)+'px';
    selPop.classList.add('show');
  } else {
    selPop.classList.remove('show');
  }
});
document.addEventListener('mousedown',function(e){
  if(!selPop.contains(e.target) && e.target!==mText && !mText.contains(e.target)) selPop.classList.remove('show');
});

function restoreSelection(){
  if(!savedRange) return null;
  var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
  return savedRange;
}

// wrap current selection in a span with given class; optionally append inserted text
function wrapSelection(cls, insertAfterText){
  var range=restoreSelection(); if(!range) return '';
  var original=range.toString();
  var span=document.createElement('span');
  span.className=cls;
  try{ range.surroundContents(span); }
  catch(e){ // selection spans multiple nodes → extract + wrap
    var frag=range.extractContents(); span.appendChild(frag); range.insertNode(span);
  }
  if(insertAfterText){
    var ins=document.createElement('span');
    ins.className='aw-sug-ins'; ins.textContent=' '+insertAfterText;
    span.parentNode.insertBefore(ins, span.nextSibling);
  }
  selPop.classList.remove('show');
  return original;
}

// Suggest edit: strike original (red) + insert replacement (green)
document.getElementById('popSuggest').onclick=function(){
  var orig=savedRange?savedRange.toString():'';
  var sug=prompt('Đề xuất sửa "'+orig+'" thành:');
  if(sug){ wrapSelection('aw-sug-del', sug); recordSuggestion(orig,sug,'edit'); }
  else selPop.classList.remove('show');
};
// Strikethrough only (delete suggestion)
document.getElementById('popStrike').onclick=function(){
  var orig=wrapSelection('aw-sug-del',''); if(orig)recordSuggestion(orig,'','strike');
};
// Highlight
document.getElementById('popHl').onclick=function(){
  var orig=wrapSelection('aw-hl',''); if(orig)recordSuggestion(orig,'','highlight');
};
// Comment (dotted underline + note)
document.getElementById('popComment').onclick=function(){
  var orig=savedRange?savedRange.toString():'';
  var note=prompt('Bình luận cho "'+orig+'":');
  if(note){
    var range=restoreSelection();
    var span=document.createElement('span');
    span.className='aw-doc-comment'; span.title=note;
    try{range.surroundContents(span);}catch(e){var f=range.extractContents();span.appendChild(f);range.insertNode(span);}
    recordSuggestion(orig,note,'comment');
  }
  selPop.classList.remove('show');
};

function recordSuggestion(orig,sug,type){
  currentAnnot.suggestions.push({original:orig,suggestion:sug,type:type});
  renderSuggestions();
}
function renderSuggestions(){
  var box=document.getElementById('suggestList');
  if(!currentAnnot.suggestions.length){box.innerHTML='<p style="font-size:.8rem;color:var(--aw-ink-3)">Chưa có đề xuất nào.</p>';return;}
  var labels={edit:'→',strike:'✕ delete',highlight:'🖍',comment:'💬'};
  box.innerHTML=currentAnnot.suggestions.map(function(s,i){
    var mid = s.type==='edit' ? ' → <span class="sug">'+AW.esc(s.suggestion)+'</span>'
            : s.type==='comment' ? ' <i style="color:var(--aw-accent-dk)">💬 '+AW.esc(s.suggestion)+'</i>'
            : ' <i>'+ (labels[s.type]||'') +'</i>';
    return '<div class="aw-suggest"><span class="orig">'+AW.esc(s.original)+'</span>'+mid+
      ' <button onclick="rmSuggest('+i+')" style="float:right;border:none;background:none;color:var(--aw-danger);cursor:pointer">✕</button></div>';
  }).join('');
}
window.rmSuggest=function(i){currentAnnot.suggestions.splice(i,1);renderSuggestions();};

document.getElementById('saveFb').onclick=function(){
  var overall=document.getElementById('sOverall').value;
  var btn=this; btn.disabled=true; var orig=btn.textContent; btn.innerHTML='<span class="aw-spin"></span>';
  AW.api('teacher.saveAnnotation',{

    tr:document.getElementById('sTR').value, cc:document.getElementById('sCC').value,

  }).then(function(res){
    if(res&&res.success){AW.toast('Đã lưu nhận xét & điểm','ok');document.getElementById('modalBg').classList.remove('show');}
    else AW.toast('Lưu thất bại','err');
  }).finally(function(){ btn.disabled=false; btn.textContent=orig; });
};

/*═══════════ RESULTS ═══════════*/
var resultsData=[], resultsSort={key:'name',dir:1};
function showResults(){
  document.getElementById('awPageTitle').textContent='Results';
  content.innerHTML=
    '<div class="aw-tabs">' +
      '<button class="aw-tab active" data-mode="free">Free Writing</button>' +
      '<button class="aw-tab" data-mode="inclass">In-Class Practice</button>' +
      '<button class="aw-tab" data-mode="homework">Homework</button>' +
    '</div>' +
    '<div class="aw-toolbar"><div class="aw-search">'+AW.icon('search')+
      '<input id="resSearch" placeholder="Search student, ID, topic…"></div>'+
      '<span id="resCount" style="color:var(--aw-ink-3);font-size:.85rem"></span></div>'+
    '<div id="resultsBox"></div>';
  AW.els('.aw-tab').forEach(function(t){
    t.onclick=function(){AW.els('.aw-tab').forEach(function(x){x.classList.remove('active');});t.classList.add('active');loadResults(t.dataset.mode);};
  });
  document.getElementById('resSearch').oninput=function(){ renderResults(this.value); };
  loadResults('free');
}
function loadResults(mode){
  var box=document.getElementById('resultsBox');
  box.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div>';
  AW.api('teacher.getResults',{class:curClass(),mode:mode}).then(function(res){
    resultsData=(res&&res.data)||[];
    renderResults('');
  });
}
function scoreCell(w){
  if(!w) return '<td>—</td>';
  var o=w.overall||w.teacher||'—';
  var pop='TR '+(w.tr||'—')+' · CC '+(w.cc||'—')+' · LR '+(w.lr||'—')+' · GRA '+(w.gra||'—');
  return '<td><span class="aw-res-overall '+AW.scoreClass(o)+'">'+o+'<span class="aw-res-pop">'+pop+'</span></span></td>';
}
function timeCells(w){
  if(!w) return '<td>—</td><td>—</td><td>—</td>';
  function t(x){ if(!x)return '—'; var d=new Date(x); return isNaN(d)?x:(d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')); }
  function dur(s){ if(!s)return '—'; s=parseInt(s,10); if(isNaN(s))return '—'; var m=Math.floor(s/60); return m>=60?(Math.floor(m/60)+'h'+(m%60)+'m'):(m+'m'); }
  return '<td>'+t(w.startTime)+'</td><td>'+t(w.finishTime)+'</td><td>'+dur(w.duration)+'</td>';
}
function renderResults(q){
  var box=document.getElementById('resultsBox'); if(!box)return;
  q=(q||'').toLowerCase();
  var rows=resultsData.filter(function(g){
    if(!q)return true;
    return (g.name+' '+g.studentId+' '+g.topic+' '+(g.className||g.class)).toLowerCase().indexOf(q)>-1;
  });
  var cnt=document.getElementById('resCount'); if(cnt)cnt.textContent=rows.length+' rows';
  if(!rows.length){box.innerHTML='<div class="aw-empty">'+AW.icon('results')+'<p>No results in this mode yet.</p></div>';return;}
  rows.sort(function(a,b){
    var k=resultsSort.key, av=(a[k]||'').toString().toLowerCase(), bv=(b[k]||'').toString().toLowerCase();
    return av<bv?-resultsSort.dir:av>bv?resultsSort.dir:0;
  });
  // 3 writes + Best write + Attempts summary
  var writeLabels=['First Write','Second Write','Third Write','Best Write'];
  var top='<tr><th class="sticky" rowspan="2" data-sort="studentId">Student ID</th>'+
    '<th rowspan="2" data-sort="name">Name</th><th rowspan="2" data-sort="className">Class</th>'+
    '<th rowspan="2" data-sort="topic">Topic</th>';
  writeLabels.forEach(function(l){ top+='<th colspan="4">'+l+'</th>'; });
  top+='<th rowspan="2" data-sort="bestResult">Attempts</th></tr><tr>';
  writeLabels.forEach(function(){ top+='<th>Start</th><th>Finish</th><th>Dur</th><th>Result</th>'; });
  top+='</tr>';

  var body=rows.map(function(g,gi){
    var w=g.writes||[];
    // best write = highest overall
    var best=null,bestIdx=-1;
    w.forEach(function(x,xi){var v=parseFloat(x.overall);if(!isNaN(v)&&(best===null||v>parseFloat(best.overall))){best=x;bestIdx=xi;}});
    var picks=[ w[0], w[1], w[2], best ];
    // attempts summary cell
    var vals=w.map(function(x){return parseFloat(x.overall);}).filter(function(v){return !isNaN(v);});
    var avg=vals.length?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):'—';
    var bestVal=best?best.overall:'—';
    var improve = (vals.length>=2)? (vals[vals.length-1]-vals[0]).toFixed(1) : null;
    var impBadge = improve!==null ? (parseFloat(improve)>=0?'<span style="color:var(--aw-writing)">▲ +'+improve+'</span>':'<span style="color:var(--aw-danger)">▼ '+improve+'</span>') : '';
    var attemptsCell='<div style="font-size:.8rem;line-height:1.5">'+
      '<div><b>'+w.length+'/3</b> lần</div>'+
      '<div>Best: <b style="color:var(--aw-primary)">'+bestVal+'</b></div>'+
      '<div>Avg: '+avg+'</div>'+
      (impBadge?'<div>'+impBadge+'</div>':'')+'</div>';

    var tds='<td class="sticky">'+AW.esc(g.studentId)+'</td><td>'+AW.esc(g.name||'')+'</td>'+
      '<td>'+AW.esc(g.className||g.class||'')+'</td><td style="text-align:left;white-space:normal;max-width:170px">'+AW.esc(g.topic||'')+'</td>';
    picks.forEach(function(p,pi){ tds+=timeCells(p)+scoreCell(p,gi,pi); });
    tds+='<td>'+attemptsCell+'</td>';
    return '<tr>'+tds+'</tr>';
  }).join('');

  box.innerHTML='<div class="aw-table-wrap" style="overflow-x:auto"><table class="aw-res-table"><thead>'+top+'</thead><tbody>'+body+'</tbody></table></div>';
  AW.els('[data-sort]').forEach(function(th){
    th.style.cursor='pointer';
    th.onclick=function(){
      var k=th.dataset.sort;
      resultsSort.dir = (resultsSort.key===k)? -resultsSort.dir : 1;
      resultsSort.key=k;
      renderResults(document.getElementById('resSearch').value);
    };
  });
}

function loadAssignmentList(mode){
  AW.api('write.getAssignments',{class:curClass(),mode:mode}).then(function(res){
    var rows=(res&&res.data)||[];
    var box=document.getElementById('assignList');
    if(!box)return;
    if(!rows.length){
      box.innerHTML='<div class="aw-empty">'+AW.icon('modes')+'<p>Chưa có bài tập '+(mode==='inclass'?'In-class':'Homework')+' nào.</p></div>';
      return;
    }
    box.innerHTML='<div class="aw-table-wrap"><table class="aw-table"><thead><tr>'+
      '<th>Topic</th><th>Class</th><th>Required</th><th>Deadline</th></tr></thead><tbody>'+
      rows.map(function(a){
        var plain=AW.stripHtml?AW.stripHtml(a.prompt||''):(a.prompt||'').replace(/<[^>]*>/g,'');
        return '<tr><td><b>'+AW.esc(a.topic)+'</b><br><span style="font-size:.8rem;color:var(--aw-ink-3)">'+AW.esc(plain.slice(0,80))+'</span></td>'+
          '<td>'+AW.esc(a.class||curClass())+'</td>'+
          '<td style="text-align:center">'+(a.requiredAttempts||1)+'</td>'+
          '<td>'+(a.deadline?AW.esc(a.deadline):'—')+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  });
}

    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">My Classes</h3>'+
    '<button class="aw-btn aw-btn-primary" style="padding:7px 14px" onclick="showCreateClass()">+ New Class</button></div>'+
    (myClasses.length?'<div class="aw-table-wrap"><table class="aw-table"><thead><tr><th>Class Name</th><th>Class Code</th><th>Year</th><th>Semester</th></tr></thead><tbody>'+clsRows+'</tbody></table></div>':'<p style="color:var(--aw-ink-3)">Chưa có lớp nào.</p>')+
    '</div>'+
    '<div class="aw-card" style="padding:24px;max-width:600px">'+
      '<h3 style="margin:0 0 14px">Change Password</h3>'+
      '<div class="aw-field"><label class="aw-label">Mật khẩu hiện tại</label><input class="aw-input" id="tpwOld" type="password"></div>'+
      '<div class="aw-field"><label class="aw-label">Mật khẩu mới</label><input class="aw-input" id="tpwNew" type="password"></div>'+
      '<div class="aw-field"><label class="aw-label">Xác nhận</label><input class="aw-input" id="tpwNew2" type="password"></div>'+
      '<button class="aw-btn aw-btn-primary" id="tpwBtn">Update password</button>'+
    '</div>';
  document.getElementById('tpwBtn').onclick=function(){
    var o=document.getElementById('tpwOld').value, n=document.getElementById('tpwNew').value, n2=document.getElementById('tpwNew2').value;
    if(!o||!n){AW.toast('Nhập đầy đủ.','err');return;}
    if(n!==n2){AW.toast('Mật khẩu mới không khớp.','err');return;}
    AW.api('auth.changePassword',{email:sess.email,oldPass:o,newPass:n}).then(function(res){
      if(res&&res.success)AW.toast('Đã đổi mật khẩu','ok');
      else AW.toast((res&&res.error)||'Thất bại','err');
    });
  };
}

/*═══════════ init ═══════════*/
function routeInitial(){
  var hash=(location.hash||'').replace('#','');
  if(hash==='live'){showLive();AW.setActiveNav('live');}
  else if(hash==='results'){showResults();AW.setActiveNav('results');}
  else if(hash==='assignments'){showAssignments();AW.setActiveNav('assignments');}
  else showOverview();
}
bootClasses();
</script>
