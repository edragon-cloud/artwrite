<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Teacher · ArticuWrite</title>
<link rel="stylesheet" href="aw-theme.css">
<style>
  /* live observation grid */
  .aw-live-wrap{display:grid;grid-template-columns:1fr 250px;gap:18px}
  @media(max-width:900px){.aw-live-wrap{grid-template-columns:1fr}}
  .aw-live-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px}
  .aw-live-cell{background:var(--aw-surface);border:1.5px solid var(--aw-border-2);border-radius:var(--aw-r);padding:12px 10px;text-align:center;cursor:pointer;transition:transform .12s,border-color .14s,box-shadow .14s}
  .aw-live-cell:hover{transform:translateY(-2px);border-color:var(--aw-primary);box-shadow:var(--aw-shadow)}
  .aw-live-cell.sel{border-color:var(--aw-primary);box-shadow:var(--aw-ring)}
  .aw-live-av{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--aw-primary),#0A93BD);color:#fff;display:grid;place-items:center;font-weight:700;font-size:.85rem;margin:0 auto 8px}
  .aw-live-name{font-size:.8rem;font-weight:600;color:var(--aw-ink);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .aw-live-status{display:inline-flex;align-items:center;gap:5px;font-size:.72rem;color:var(--aw-ink-2)}
  .aw-live-side{background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:16px;box-shadow:var(--aw-shadow-sm);align-self:start}
  .aw-live-side h4{margin:0 0 12px;font-size:.95rem}
  .aw-stat-row{display:flex;justify-content:space-between;font-size:.86rem;padding:6px 0;color:var(--aw-ink-2)}
  .aw-stat-row b{color:var(--aw-ink)}
  /* annotation modal */
  .aw-modal-bg{position:fixed;inset:0;background:rgba(16,34,46,.5);z-index:500;display:none;align-items:center;justify-content:center;padding:20px}
  .aw-modal-bg.show{display:flex}
  .aw-modal{background:var(--aw-surface);border-radius:var(--aw-r-lg);width:100%;max-width:1000px;max-height:90vh;overflow:hidden;display:grid;grid-template-columns:1fr 300px;box-shadow:var(--aw-shadow-lg)}
  @media(max-width:800px){.aw-modal{grid-template-columns:1fr}}
  .aw-modal-doc{padding:24px;overflow-y:auto;max-height:90vh}
  .aw-modal-doc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .aw-doc-text{font-size:1rem;line-height:1.9;color:var(--aw-ink);white-space:pre-wrap;user-select:text;outline:none;min-height:200px;border:1px solid var(--aw-border-2);border-radius:var(--aw-r-sm);padding:16px}
  .aw-doc-text:focus{border-color:var(--aw-primary)}
  .aw-sug-del{color:var(--aw-danger);text-decoration:line-through;text-decoration-thickness:2px}
  .aw-sug-ins{color:var(--aw-writing);font-weight:600}
  .aw-hl{background:#FFF1A8;border-radius:2px;padding:0 1px}
  .aw-doc-comment{border-bottom:2px dotted var(--aw-accent);cursor:help}
  .aw-modal-side{background:var(--aw-surface-2);padding:20px;border-left:1px solid var(--aw-border-2);overflow-y:auto;max-height:90vh}
  .aw-modal-side h4{margin:0 0 12px;font-size:.95rem}
  .aw-suggest-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
  .aw-suggest{background:#FFF;border:1px solid var(--aw-border);border-radius:var(--aw-r-sm);padding:10px;font-size:.82rem}
  .aw-suggest .orig{color:var(--aw-danger);text-decoration:line-through}
  .aw-suggest .sug{color:var(--aw-writing);font-weight:600}
  .aw-score-input{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .aw-score-input label{width:40px;font-weight:600;font-size:.85rem}
  .aw-score-input input{width:60px;padding:6px 8px;border:1.5px solid var(--aw-border);border-radius:6px;text-align:center}
  .aw-sel-pop{position:fixed;z-index:600;background:var(--aw-primary-dk);border-radius:8px;padding:4px;display:none;gap:2px;box-shadow:var(--aw-shadow-lg)}
  .aw-sel-pop.show{display:flex}
  .aw-sel-pop button{background:none;border:none;color:#fff;padding:6px 10px;font-size:.8rem;cursor:pointer;border-radius:5px;font-family:var(--aw-font-body)}
  .aw-sel-pop button:hover{background:rgba(255,255,255,.15)}
  /* recent activity */
  .aw-two-col{display:grid;grid-template-columns:1fr 300px;gap:18px}
  @media(max-width:900px){.aw-two-col{grid-template-columns:1fr}}
  .aw-panel{background:var(--aw-surface);border:1px solid var(--aw-border-2);border-radius:var(--aw-r);padding:20px;box-shadow:var(--aw-shadow-sm)}
  .aw-tabs{display:flex;gap:4px;border-bottom:2px solid var(--aw-border-2);margin-bottom:18px}
  .aw-tab{padding:10px 18px;border:none;background:none;font-family:var(--aw-font-body);font-weight:600;font-size:.92rem;color:var(--aw-ink-3);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-2px}
  .aw-tab.active{color:var(--aw-primary);border-bottom-color:var(--aw-primary)}
  /* assignment modal */
  .aw-amodal{background:var(--aw-surface);border-radius:var(--aw-r-lg);width:100%;max-width:640px;max-height:90vh;overflow-y:auto;box-shadow:var(--aw-shadow-lg);padding:30px}
  .aw-amodal h2{font-family:var(--aw-font-display);margin:0 0 4px;font-size:1.4rem}
  .aw-editor-mini-tb{display:flex;gap:2px;padding:6px 8px;border:1px solid var(--aw-border);border-bottom:none;border-radius:var(--aw-r-sm) var(--aw-r-sm) 0 0;background:var(--aw-surface-2)}
  .aw-editor-mini-tb button{width:30px;height:30px;border:none;background:none;border-radius:6px;cursor:pointer;color:var(--aw-ink-2);font-weight:700}
  .aw-editor-mini-tb button:hover{background:var(--aw-primary-lt);color:var(--aw-primary)}
  .aw-prompt-edit{min-height:120px;border:1px solid var(--aw-border);border-radius:0 0 var(--aw-r-sm) var(--aw-r-sm);padding:12px 14px;font-family:var(--aw-font-body);font-size:.95rem;line-height:1.6;outline:none;overflow-y:auto}
  .aw-prompt-edit:focus{border-color:var(--aw-primary)}
  /* wide results table */
  .aw-res-wrap{border-radius:14px;overflow:hidden;box-shadow:0 4px 20px rgba(10,58,93,.08);border:1px solid var(--aw-border-2)}
  .aw-res-table{width:100%;border-collapse:collapse;font-size:.85rem;white-space:nowrap}
  .aw-res-table th,.aw-res-table td{border:1px solid #EEF2F6;padding:9px 11px;text-align:center}
  .aw-res-table thead tr:first-child th{background:linear-gradient(135deg,#0A6EBD,#1A5F9E);color:#fff;font-family:var(--aw-font-display);font-size:.82rem;padding:12px 11px}
  .aw-res-table thead tr:nth-child(2) th{font-size:.7rem;font-weight:700;letter-spacing:.02em}
  /* colored column groups */
  .grp-1{background:#EAF2FB}   /* First - blue */
  .grp-2{background:#EEEBFA}   /* Second - purple */
  .grp-3{background:#E9F5EE}   /* Third - green */
  .grp-best{background:#FEF6E3} /* Best - amber */
  .hd-1{background:#3E7CC4 !important} .hd-2{background:#6B5FC4 !important}
  .hd-3{background:#3EA96B !important} .hd-best{background:#E0A32E !important}
  .aw-res-table td.sticky,.aw-res-table th.sticky{position:sticky;left:0;background:#fff;z-index:2;text-align:left}
  .aw-res-table thead th.sticky{background:linear-gradient(135deg,#0A6EBD,#1A5F9E)}
  .aw-res-table tbody tr:hover td{filter:brightness(.98)}
  .ms-in{width:100%;padding:3px 2px;border:1px solid var(--aw-border);border-radius:4px;text-align:center;font-size:.72rem}
  .ms-in:focus{border-color:var(--aw-primary);outline:none}
  .ms-note{padding:3px 6px;border:1px solid var(--aw-border);border-radius:4px;font-size:.72rem}
  .ms-note:focus{border-color:var(--aw-primary);outline:none}
  .aw-view-hd{background:#EA4B5E;color:#fff;border:none;border-radius:6px;padding:3px 10px;font-size:.7rem;font-weight:700;cursor:pointer;letter-spacing:.02em}
  .aw-view-hd:hover{background:#d13a4c}
  .aw-res-table td{position:relative}
  .aw-res-table td:hover{z-index:200}
  .aw-res-overall{font-weight:800;cursor:pointer;position:relative;display:inline-block;padding:6px 12px;border-radius:10px;background:#fff;box-shadow:0 1px 4px rgba(0,0,0,.08);font-size:1rem}
  .aw-res-overall small{display:block;font-size:.6rem;color:var(--aw-ink-3);font-weight:600}
  .aw-res-overall:hover{box-shadow:0 2px 10px rgba(10,110,189,.3)}
  .aw-res-overall:hover .aw-res-pop{display:block}
  .aw-res-pop{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:var(--aw-primary-dk);color:#fff;padding:8px 12px;border-radius:8px;font-size:.72rem;font-weight:500;white-space:nowrap;z-index:500;box-shadow:var(--aw-shadow-lg);pointer-events:none}
  .aw-res-pop:after{content:'';position:absolute;bottom:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-bottom-color:var(--aw-primary-dk)}
  .aw-view-btn{background:var(--aw-primary-lt);color:var(--aw-primary);border:none;border-radius:8px;padding:5px 10px;font-size:.75rem;font-weight:600;cursor:pointer}
  .aw-view-btn:hover{background:var(--aw-primary);color:#fff}
  .aw-essay-bg{position:fixed;inset:0;background:rgba(16,34,46,.55);z-index:600;display:none;align-items:flex-start;justify-content:center;padding:30px 20px;overflow-y:auto}
  .aw-essay-bg.show{display:flex}
  .aw-essay-modal{background:#fff;border-radius:16px;width:100%;max-width:760px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:26px}
  .aw-essay-modal .rv-block{margin-top:14px;padding-top:14px;border-top:1px solid var(--aw-border-2)}
  .aw-essay-modal .rv-block h4{color:var(--aw-primary);margin:0 0 6px;font-size:.85rem;text-transform:uppercase}
  .aw-essay-modal .rv-block p{margin:0 0 6px;line-height:1.55;font-size:.9rem;color:var(--aw-ink-2)}
</style>
</head>
<body>
<div id="app"></div>

<div class="aw-modal-bg" id="modalBg">
  <div class="aw-modal">
    <div class="aw-modal-doc">
      <div class="aw-modal-doc-head">
        <div><b id="mStudent">Student</b> <span style="color:var(--aw-ink-3)" id="mTopic"></span></div>
        <button class="aw-btn aw-btn-ghost" style="padding:6px 14px" id="mClose">Close</button>
      </div>
      <!-- annotation toolbar -->
      <div style="display:flex;gap:2px;flex-wrap:wrap;background:var(--aw-surface-2);border:1px solid var(--aw-border-2);border-radius:var(--aw-r-sm);padding:6px;margin-bottom:8px">
        <button class="aw-tbtn" id="annBold" title="Bold"><b>B</b></button>
        <button class="aw-tbtn" id="annItalic" title="Italic"><i>I</i></button>
        <button class="aw-tbtn" id="annUnder" title="Underline"><u>U</u></button>
        <span style="width:1px;background:var(--aw-border-2);margin:2px 4px;display:inline-block"></span>
        <button class="aw-tbtn" id="annSug" title="Suggest edit (red strike + green insert)">✎ Suggest</button>
        <button class="aw-tbtn" id="annStrike" title="Strike (delete suggestion)">S̶ Strike</button>
        <button class="aw-tbtn" id="annHl" title="Highlight">🖍</button>
        <button class="aw-tbtn" id="annComment" title="Comment">💬</button>
      </div>
      <div class="aw-doc-text" id="mText" contenteditable="false"></div>
      <p style="font-size:.78rem;color:var(--aw-ink-3);margin:10px 0 0">Select text then use the toolbar to suggest edits, highlight or comment. When done, click <b>Push to Student</b> so students can see your feedback.</p>
    </div>
    <div class="aw-modal-side">
      <h4>Teacher Suggestions</h4>
      <p style="font-size:.8rem;color:var(--aw-ink-3);margin:0 0 12px">Red strike = error · Green = suggested fix</p>
      <div class="aw-suggest-list" id="suggestList"></div>
      <h4>Scoring (IELTS)</h4>
      <div class="aw-score-input"><label>TR</label><input type="number" id="sTR" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>CC</label><input type="number" id="sCC" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>LR</label><input type="number" id="sLR" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label>GRA</label><input type="number" id="sGRA" min="0" max="9" step="0.5"></div>
      <div class="aw-score-input"><label><b>Overall</b></label><input type="number" id="sOverall" min="0" max="9" step="0.5"></div>
      <button class="aw-btn aw-btn-accent aw-btn-block" id="pushFb" style="margin-top:12px">⬆ Push to Student</button>
      <button class="aw-btn aw-btn-primary aw-btn-block" id="saveFb" style="margin-top:8px">✓ Submit & Save Score</button>
    </div>
  </div>
</div>

<div class="aw-essay-bg" id="essayModal"><div class="aw-essay-modal" id="essayModalBody"></div></div>

<div class="aw-sel-pop" id="selPop">
  <button id="popSuggest">✎ Suggest</button>
  <button id="popStrike">S̶ Strike</button>
  <button id="popHl">🖍 Highlight</button>
  <button id="popComment">💬 Comment</button>
</div>

<!-- assignment creation modal -->
<div class="aw-modal-bg" id="assignModal">
  <div class="aw-amodal">
    <h2 id="assignTitle">New Homework</h2>
    <p class="aw-auth-sub" style="margin:0 0 18px" id="assignSub">Assign to the selected class.</p>
    <div class="aw-field"><label class="aw-label">Topic / Title</label>
      <input class="aw-input" id="aTopic" placeholder="VD: Day 1 — Advertising essay"></div>
    <div class="aw-field"><label class="aw-label">Prompt / Instructions</label>
      <div class="aw-editor-mini-tb">
        <button type="button" data-c="bold"><b>B</b></button>
        <button type="button" data-c="italic"><i>I</i></button>
        <button type="button" data-c="underline"><u>U</u></button>
        <button type="button" data-c="insertUnorderedList">•</button>
      </div>
      <div class="aw-prompt-edit" id="aPrompt" contenteditable="true" data-ph="Enter the prompt, requirements, criteria… (line breaks & formatting supported)"></div>
    </div>
    <div class="aw-row" style="display:flex;gap:12px">
      <div class="aw-field" style="flex:1" id="reqField"><label class="aw-label">Required revisions</label>
        <input class="aw-input" id="aReq" type="number" value="5" min="1"></div>
      <div class="aw-field" style="flex:1" id="durField" style="display:none"><label class="aw-label">Duration (min)</label>
        <input class="aw-input" id="aDur" type="number" value="40" min="5"></div>
      <div class="aw-field" style="flex:1" id="deadField"><label class="aw-label">Deadline</label>
        <input class="aw-input" id="aDead" type="date"></div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:8px">
      <button class="aw-btn aw-btn-ghost" id="aCancel">Cancel</button>
      <button class="aw-btn aw-btn-primary" id="aCreate">Create & Assign</button>
    </div>
  </div>
</div>

<script src="aw-common.js"></script>
<script>
if (typeof AW === 'undefined') {
  document.body.innerHTML = '<div style="max-width:560px;margin:80px auto;padding:30px;border:2px solid #EA4335;border-radius:14px;font-family:system-ui;color:#10222E"><h2>&#9888; Kh&ocirc;ng t&#7843;i &#273;&#432;&#7907;c aw-common.js</h2><p>File <b>aw-common.js</b> v&agrave; <b>aw-theme.css</b> ph&#7843;i n&#7857;m <b>c&ugrave;ng th&#432; m&#7909;c</b> v&#7899;i file HTML n&agrave;y tr&ecirc;n GitHub. Upload &#273;&#7911; ch&uacute;ng r&#7891;i t&#7843;i l&#7841;i trang.</p></div>';
  throw new Error('aw-common.js not loaded');
}

var sess = AW.session.require('teacher');
if (!sess) throw 'redirect';

// selected class (persisted per teacher)
var CLASS_KEY = 'aw_teacher_class';
var myClasses = [];
function curClass(){ return localStorage.getItem(CLASS_KEY) || ''; }
function setCurClass(id){ localStorage.setItem(CLASS_KEY, id); }
function curClassObj(){ return myClasses.filter(function(c){return c.classId===curClass();})[0]||null; }

var nav = [
  { id:'overview',   label:'Class Overview', icon:'overview', active:true },
  { id:'live',       label:'Live Observation', icon:'live' },
  { id:'assignments',label:'Assignments', icon:'modes' },
  { id:'results',    label:'Results', icon:'results' },
  { id:'board',      label:'Interactive Board', icon:'modes', href:'board.html' },
  { id:'library',    label:'Library', icon:'library', href:'library.html' },
  { id:'settings',   label:'Settings', icon:'settings' },
];

var content = AW.renderShell({
  mount:'app', nav:nav, eyebrow:'Teacher Dashboard Interface', title:'Class Overview',
  onNav:function(id){
    stopLivePoll();
    if(!curClass() && id!=='settings'){ AW.toast('Create or select a class first.','err'); showClasses(); AW.setActiveNav('overview'); return; }
    if(id==='overview') showOverview();
    else if(id==='live') showLive();
    else if(id==='assignments') showAssignments();
    else if(id==='results') showResults();
    else if(id==='settings') showSettings();
    AW.setActiveNav(id);
  }
});

// class selector bar injected under topbar
function injectClassBar(){
  var old=document.getElementById('classBar'); if(old)old.remove();
  var bar=document.createElement('div');
  bar.id='classBar';
  bar.style.cssText='display:flex;align-items:center;gap:12px;padding:12px 30px;background:var(--aw-surface);border-bottom:1px solid var(--aw-border-2);flex-wrap:wrap';
  var opts=myClasses.map(function(c){
    return '<option value="'+AW.esc(c.classId)+'"'+(c.classId===curClass()?' selected':'')+'>'+AW.esc(c.className)+' ('+AW.esc(c.classId)+')</option>';
  }).join('');
  bar.innerHTML=
    '<span style="font-weight:600;font-size:.85rem;color:var(--aw-ink-2)">Class:</span>'+
    '<select class="aw-select" id="classSel"'+(myClasses.length?'':' disabled')+'>'+
      (myClasses.length?opts:'<option>No classes yet</option>')+'</select>'+
    (curClassObj()?'<span class="aw-tag aw-tag-type">'+AW.esc(curClassObj().year||'')+(curClassObj().semester?' · HK'+AW.esc(curClassObj().semester):'')+'</span>':'')+
    '<button class="aw-btn aw-btn-primary" style="margin-left:auto;padding:8px 16px" id="newClassBtn">+ Create New Class</button>';
  var main=document.querySelector('.aw-main');
  var topbar=main.querySelector('.aw-topbar');
  topbar.insertAdjacentElement('afterend', bar);
  var sel=document.getElementById('classSel');
  if(sel) sel.onchange=function(){ setCurClass(this.value); location.reload(); };
  document.getElementById('newClassBtn').onclick=showCreateClass;
}

/*═══════════ CLASSES ═══════════*/
function bootClasses(){
  AW.api('class.list',{teacherEmail:sess.email}).then(function(res){
    myClasses=(res&&res.data)||[];
    if(myClasses.length && !curClass()) setCurClass(myClasses[0].classId);
    injectClassBar();
    if(!myClasses.length){ showClasses(); }
    else { routeInitial(); }
  });
}

function showClasses(){
  document.getElementById('awPageTitle').textContent='My Classes';
  if(!myClasses.length){
    content.innerHTML='<div class="aw-empty">'+AW.icon('overview')+
      '<p>You have no classes yet. Create your first class to begin.</p>'+
      '<button class="aw-btn aw-btn-primary" style="margin-top:14px" onclick="showCreateClass()">+ Create New Class</button></div>';
    return;
  }
  content.innerHTML='<div class="aw-grid">'+myClasses.map(function(c){
    return '<div class="aw-lib-card" onclick="pickClass(\''+c.classId+'\')">'+
      '<h3 class="aw-lib-title">'+AW.esc(c.className)+'</h3>'+
      '<span class="aw-tag aw-tag-type">'+AW.esc(c.classId)+'</span> '+
      '<span class="aw-tag aw-tag-medium">'+AW.esc(c.year||'')+(c.semester?' · HK'+AW.esc(c.semester):'')+'</span>'+
      '<p class="aw-lib-desc">Class code to share with students: <b>'+AW.esc(c.classId)+'</b></p></div>';
  }).join('')+'</div>';
}
window.pickClass=function(id){ setCurClass(id); location.reload(); };

window.showCreateClass=function(){
  var name=prompt('Class name (e.g. IELTS Writing 01):'); if(!name)return;
  var year=prompt('Academic year (e.g. 2026-2027):','2026-2027')||'';
  var sem=prompt('Semester (1, 2 or 3):','2')||'';
  AW.api('class.create',{className:name,year:year,semester:sem,teacherEmail:sess.email}).then(function(res){
    if(res&&res.success){
      AW.toast('Class created · Code: '+res.data.classId,'ok',4000);
      setCurClass(res.data.classId);
      setTimeout(function(){location.reload();},800);
    } else AW.toast((res&&res.error)||'Failed to create class','err');
  });
};

/*═══════════ OVERVIEW ═══════════*/
function showOverview(){
  document.getElementById('awPageTitle').textContent='Class Overview';
  content.innerHTML='<div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div>';
  AW.api('teacher.getOverview',{class:curClass()}).then(function(res){
    var d=(res&&res.data)||{avgScore:0,totalEssays:0,activeStudents:0,feedbackPending:0};
    content.innerHTML=
      '<div class="aw-kpi-row">' +
        kpi('Average Class Score', d.avgScore||'—') +
        kpi('Total Essays Submitted', d.totalEssays) +
        kpi('Active Students', d.activeStudents) +
        kpi('Feedback Pending', d.feedbackPending) +
      '</div>' +
      '<div class="aw-two-col">' +
        '<div class="aw-panel"><h3 style="margin:0 0 14px">Class Roster <span id="rosterCount" style="color:var(--aw-ink-3);font-weight:400;font-size:.85rem"></span></h3><div id="roster"></div></div>' +
        '<div class="aw-panel"><h3 style="margin:0 0 14px">Quick Actions</h3>' +
          '<button class="aw-btn aw-btn-primary aw-btn-block" style="margin-bottom:10px" onclick="document.querySelector(\'[data-nav=assignments]\').click()">+ New Assignment</button>' +

/*═══════════ ANNOTATION MODAL — Google-Docs-style inline editing ═══════════
  The doc is contentEditable. Selecting text + choosing a tool wraps the
  selection in a styled span (strikethrough + green insertion, highlight,
  or comment). Suggestions are also recorded in a structured list so they
  can be saved to the backend and reviewed.
─────────────────────────────────────────────────────────────────*/
var currentAnnot={ studentId:null, topicId:null, mode:null, suggestions:[] };
var mText=document.getElementById('mText');
var selPop=document.getElementById('selPop');
var savedRange=null;

function openAnnotation(s){
  currentAnnot={ studentId:s.studentId, topicId:s.topicId, mode:s.mode, suggestions:[] };
  document.getElementById('mStudent').textContent=s.name||s.studentId;
  document.getElementById('mTopic').textContent=s.topic?('· '+s.topic):'';
  mText.textContent=s.snapshot||'(chưa có nội dung)';
  mText.setAttribute('contenteditable','true');
  document.getElementById('suggestList').innerHTML='<p style="font-size:.8rem;color:var(--aw-ink-3)">Chưa có đề xuất assignments yet.</p>';
  ['sTR','sCC','sLR','sGRA','sOverall'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('modalBg').classList.add('show');
  // wire toolbar buttons to trigger same actions as popup
  document.getElementById('annBold').onclick=function(){ document.execCommand('bold'); };
  document.getElementById('annItalic').onclick=function(){ document.execCommand('italic'); };
  document.getElementById('annUnder').onclick=function(){ document.execCommand('underline'); };
  document.getElementById('annSug').onclick=function(){ triggerAnnotation('suggest'); };
  document.getElementById('annStrike').onclick=function(){ triggerAnnotation('strike'); };
  document.getElementById('annHl').onclick=function(){ triggerAnnotation('highlight'); };
  document.getElementById('annComment').onclick=function(){ triggerAnnotation('comment'); };
}
function triggerAnnotation(type){
  // save current selection if any, or re-use savedRange
  var sel=window.getSelection();
  if(sel.rangeCount && sel.toString().trim()) savedRange=sel.getRangeAt(0).cloneRange();
  if(type==='suggest') document.getElementById('popSuggest').onclick();
  else if(type==='strike') document.getElementById('popStrike').onclick();
  else if(type==='highlight') document.getElementById('popHl').onclick();
  else if(type==='comment') document.getElementById('popComment').onclick();
}
// Push to Student — writes annotatedHtml back to LiveSessions snapshot
// so student can poll and see teacher's inline marks
document.getElementById('pushFb').onclick=function(){
  var btn=this; btn.disabled=true; var o=btn.innerHTML;

  }).then(function(res){

};
document.getElementById('mClose').onclick=function(){

};

// show popup on selection within the doc
mText.addEventListener('mouseup',function(e){
  var sel=window.getSelection();
  var txt=sel.toString().trim();
  if(txt && sel.rangeCount){
    savedRange=sel.getRangeAt(0).cloneRange();
    selPop.style.left=Math.max(8,e.clientX-40)+'px';
    selPop.style.top=Math.max(8,e.clientY-48)+'px';
    selPop.classList.add('show');
  } else {
    selPop.classList.remove('show');
  }
});
document.addEventListener('mousedown',function(e){
  if(!selPop.contains(e.target) && e.target!==mText && !mText.contains(e.target)) selPop.classList.remove('show');
});

function restoreSelection(){
  if(!savedRange) return null;
  var sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(savedRange);
  return savedRange;
}

// wrap current selection in a span with given class; optionally append inserted text
function wrapSelection(cls, insertAfterText){
  var range=restoreSelection(); if(!range) return '';
  var original=range.toString();
  var span=document.createElement('span');
  span.className=cls;
  try{ range.surroundContents(span); }
  catch(e){ // selection spans multiple nodes → extract + wrap
    var frag=range.extractContents(); span.appendChild(frag); range.insertNode(span);
  }
  if(insertAfterText){
    var ins=document.createElement('span');
    ins.className='aw-sug-ins'; ins.textContent=' '+insertAfterText;
    span.parentNode.insertBefore(ins, span.nextSibling);
  }
  selPop.classList.remove('show');
  return original;
}

// Suggest edit: strike original (red) + insert replacement (green)
document.getElementById('popSuggest').onclick=function(){
  var orig=savedRange?savedRange.toString():'';
  var sug=prompt('Đề xuất sửa "'+orig+'" thành:');
  if(sug){ wrapSelection('aw-sug-del', sug); recordSuggestion(orig,sug,'edit'); }
  else selPop.classList.remove('show');
};
// Strikethrough only (delete suggestion)
document.getElementById('popStrike').onclick=function(){
  var orig=wrapSelection('aw-sug-del',''); if(orig)recordSuggestion(orig,'','strike');
};
// Highlight
document.getElementById('popHl').onclick=function(){
  var orig=wrapSelection('aw-hl',''); if(orig)recordSuggestion(orig,'','highlight');
};
// Comment (dotted underline + note)
document.getElementById('popComment').onclick=function(){
  var orig=savedRange?savedRange.toString():'';
  var note=prompt('Bình luận cho "'+orig+'":');
  if(note){
    var range=restoreSelection();
    var span=document.createElement('span');
    span.className='aw-doc-comment'; span.title=note;
    try{range.surroundContents(span);}catch(e){var f=range.extractContents();span.appendChild(f);range.insertNode(span);}
    recordSuggestion(orig,note,'comment');
  }
  selPop.classList.remove('show');
};

function recordSuggestion(orig,sug,type){
  currentAnnot.suggestions.push({original:orig,suggestion:sug,type:type});
  renderSuggestions();
}
function renderSuggestions(){
  var box=document.getElementById('suggestList');
  if(!currentAnnot.suggestions.length){box.innerHTML='<p style="font-size:.8rem;color:var(--aw-ink-3)">Chưa có đề xuất assignments yet.</p>';return;}
  var labels={edit:'→',strike:'✕ delete',highlight:'🖍',comment:'💬'};
  box.innerHTML=currentAnnot.suggestions.map(function(s,i){
    var mid = s.type==='edit' ? ' → <span class="sug">'+AW.esc(s.suggestion)+'</span>'
            : s.type==='comment' ? ' <i style="color:var(--aw-accent-dk)">💬 '+AW.esc(s.suggestion)+'</i>'
            : ' <i>'+ (labels[s.type]||'') +'</i>';
    return '<div class="aw-suggest"><span class="orig">'+AW.esc(s.original)+'</span>'+mid+
      ' <button onclick="rmSuggest('+i+')" style="float:right;border:none;background:none;color:var(--aw-danger);cursor:pointer">✕</button></div>';
  }).join('');
}
window.rmSuggest=function(i){currentAnnot.suggestions.splice(i,1);renderSuggestions();};

function scoreCell(w,grpClass,gi,writeIdx){

function timeCells(w,grpClass){
  var cl=grpClass||'';
  if(!w) return '<td class="'+cl+'">—</td><td class="'+cl+'">—</td><td class="'+cl+'">—</td>';
  function t(x){ if(!x)return '—'; var d=new Date(x); return isNaN(d)?x:(d.getHours()+':'+String(d.getMinutes()).padStart(2,'0')); }
  function dur(s){ if(!s)return '—'; s=parseInt(s,10); if(isNaN(s))return '—'; var m=Math.floor(s/60); return m>=60?(Math.floor(m/60)+'h'+(m%60)+'m'):(m+'m'); }
  return '<td class="'+cl+'">'+t(w.startTime)+'</td><td class="'+cl+'">'+t(w.finishTime)+'</td><td class="'+cl+'">'+dur(w.duration)+'</td>';
}
function renderResults(){
  var box=document.getElementById('resultsBox'); if(!box)return;
  var q=(document.getElementById('resSearch')?document.getElementById('resSearch').value:'').toLowerCase();
  var fClass=document.getElementById('fClass')?document.getElementById('fClass').value:'';
  var fTopic=document.getElementById('fTopic')?document.getElementById('fTopic').value:'';
  var rows=resultsData.filter(function(g){
    if(fClass && (g.className||g.class)!==fClass) return false;
    if(fTopic && g.topic!==fTopic) return false;
    if(q && (g.name+' '+g.studentId).toLowerCase().indexOf(q)===-1) return false;
    return true;
  });
  var cnt=document.getElementById('resCount'); if(cnt)cnt.textContent=rows.length+' results';
  if(!rows.length){box.innerHTML='<div class="aw-empty">'+AW.icon('results')+'<p>No results in this mode yet.</p></div>';return;}
  rows.sort(function(a,b){
    var k=resultsSort.key;
    if(k==='bestResult'||k==='attemptCount'){ return (parseFloat(b[k])||0)-(parseFloat(a[k])||0); }
    var av=(a[k]||'').toString().toLowerCase(), bv=(b[k]||'').toString().toLowerCase();
    return av<bv?-1:av>bv?1:0;
  });
  var writeLabels=[['First Write','grp-1','hd-1',0],['Second Write','grp-2','hd-2',1],['Third Write','grp-3','hd-3',2],['★ Best Write','grp-best','hd-best','best']];
  var top='<tr><th class="sticky" rowspan="2">Student ID</th>'+
    '<th rowspan="2">Name</th><th rowspan="2">Class</th><th rowspan="2">Topic</th>';
  writeLabels.forEach(function(l){
    top+='<th colspan="4" class="'+l[2]+'">'+l[0]+'</th>';
  });
  top+='<th rowspan="2" class="hd-best">Attempts</th></tr><tr>';
  writeLabels.forEach(function(l){ top+='<th class="'+l[1]+'">Start</th><th class="'+l[1]+'">Finish</th><th class="'+l[1]+'">Dur</th><th class="'+l[1]+'">Result</th>'; });
  top+='</tr>';

  var body=rows.map(function(g,gi){
    var w=g.writes||[];
    var best=null,bestI=-1;
    w.forEach(function(x,xi){var v=parseFloat(x.overall);if(!isNaN(v)&&(best===null||v>parseFloat(best.overall))){best=x;bestI=xi;}});
    var groups=['grp-1','grp-2','grp-3','grp-best'];
    var picks=[ w[0], w[1], w[2], best ];
    var vals=w.map(function(x){return parseFloat(x.overall);}).filter(function(v){return !isNaN(v);});
    var avg=vals.length?(vals.reduce(function(a,b){return a+b;},0)/vals.length).toFixed(1):'—';
    var bestVal=best?best.overall:'—';
    var improve=(vals.length>=2)?(vals[vals.length-1]-vals[0]).toFixed(1):null;
    var impBadge=improve!==null?(parseFloat(improve)>=0?'<span style="color:var(--aw-writing)">▲ +'+improve+'</span>':'<span style="color:var(--aw-danger)">▼ '+improve+'</span>'):'';
    var ts = g.teacherScore || {};
    var attemptsCell='<div style="font-size:.78rem;line-height:1.5;width:200px;padding:2px" class="grp-best">'+
      '<div style="margin-bottom:6px"><b>'+w.length+'/3</b> attempts · AI best <b style="color:var(--aw-primary)">'+bestVal+'</b></div>'+
      '<div style="font-weight:600;margin-bottom:3px;color:var(--aw-ink-2)">Teacher scoring:</div>'+
      '<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:3px;margin-bottom:5px">'+
        '<input class="ms-in" data-f="tr" placeholder="TR" value="'+AW.esc(ts.tr||'')+'" title="Task Response">'+
        '<input class="ms-in" data-f="cc" placeholder="CC" value="'+AW.esc(ts.cc||'')+'" title="Coherence">'+
        '<input class="ms-in" data-f="lr" placeholder="LR" value="'+AW.esc(ts.lr||'')+'" title="Lexical">'+
        '<input class="ms-in" data-f="gra" placeholder="GR" value="'+AW.esc(ts.gra||'')+'" title="Grammar">'+
        '<input class="ms-in" data-f="overall" placeholder="OA" value="'+AW.esc(ts.overall||'')+'" title="Overall" style="font-weight:700;background:#FEF6E3">'+
      '</div>'+
      '<div style="display:flex;gap:5px;align-items:center">'+
        '<input class="ms-note" data-f="note" placeholder="Note…" value="'+AW.esc(ts.note||'')+'" style="flex:1;min-width:0">'+
        '<button class="ms-save aw-btn aw-btn-primary" style="padding:5px 12px;font-size:.72rem;flex:0 0 auto" data-gi="'+gi+'">Save</button>'+
      '</div>'+
      (ts.gradedAt?'<div style="font-size:.65rem;color:var(--aw-writing);margin-top:3px">✓ Graded</div>':'')+
    '</div>';
    var topicCell='<td style="text-align:left;white-space:normal;max-width:170px"><b>'+AW.esc(g.topic||'')+'</b></td>';
    var tds='<td class="sticky">'+AW.esc(g.studentId)+'</td><td>'+AW.esc(g.name||'')+'</td>'+
      '<td>'+AW.esc(g.className||g.class||'')+'</td>'+topicCell;
    picks.forEach(function(p,pi){
      // map pick index to actual write index (best uses bestI)
      var realIdx = (pi<3) ? pi : bestI;
      tds+=timeCells(p,groups[pi])+scoreCell(p,groups[pi],gi,realIdx);
    });
    tds+='<td class="grp-best">'+attemptsCell+'</td>';
    return '<tr data-gi="'+gi+'" data-besti="'+bestI+'">'+tds+'</tr>';
  }).join('');

  box.innerHTML='<p style="font-size:.82rem;color:var(--aw-ink-3);margin:0 0 10px">💡 Click any <b>Result</b> score to view that attempt\'s full essay and feedback.</p>'+
    '<div class="aw-res-wrap" style="overflow-x:auto"><table class="aw-res-table"><thead>'+top+'</thead><tbody>'+body+'</tbody></table></div>';
  // click a Result score to view that attempt's essay + feedback
  AW.els('[data-open-gi]').forEach(function(cell){
    cell.style.cursor='pointer';
    cell.title='Click to view this attempt';
    cell.onclick=function(){ viewEssays(+cell.dataset.openGi, +cell.dataset.openWi); };
  });
  // manual score save + auto-average overall (IELTS rounding)
  function ieltsRound(avg){
    // round to nearest 0.5 band (IELTS convention)
    var whole=Math.floor(avg), frac=avg-whole;
    if(frac<0.25) return whole;
    if(frac<0.75) return whole+0.5;
    return whole+1;
  }
  AW.els('.grp-best').forEach(function(cell){
    var critInputs=cell.querySelectorAll('.ms-in[data-f="tr"],.ms-in[data-f="cc"],.ms-in[data-f="lr"],.ms-in[data-f="gra"]');
    var overallInput=cell.querySelector('.ms-in[data-f="overall"]');
    if(!overallInput)return;
    critInputs.forEach(function(inp){
      inp.oninput=function(){
        var nums=[];
        critInputs.forEach(function(x){var v=parseFloat(x.value);if(!isNaN(v))nums.push(v);});
        if(nums.length===4){
          var avg=nums.reduce(function(a,b){return a+b;},0)/4;
          overallInput.value=ieltsRound(avg);
        }
      };
    });
  });
  AW.els('.ms-save').forEach(function(btn){
    btn.onclick=function(){
      var gi=+btn.dataset.gi, g=resultsData[gi]; if(!g)return;
      var cell=btn.closest('.grp-best');
      var payload={ studentId:g.studentId, topicId:g.topicId,
        mode:document.querySelector('.aw-tab.active').dataset.mode };
      cell.querySelectorAll('[data-f]').forEach(function(inp){ payload[inp.dataset.f]=inp.value.trim(); });
      btn.disabled=true; var o=btn.textContent; btn.textContent='Saving…';
      AW.api('teacher.saveManualScore',payload).then(function(res){
        if(res&&res.success){ AW.toast('Score saved','ok'); g.teacherScore=payload; }
        else AW.toast((res&&res.error)||'Save failed','err');
      }).finally(function(){ btn.disabled=false; btn.textContent=o; });
    };
  });
}
// view essays + feedback. writeIdx: specific attempt index, or -1/undefined = all
window.viewEssays=function(gi, writeIdx){
  var g=resultsData[gi]; if(!g)return;
  var w=g.writes||[];
  var showList = (writeIdx==null || writeIdx<0) ? w.map(function(x,i){return {x:x,i:i};})
                                                : (w[writeIdx]?[{x:w[writeIdx],i:writeIdx}]:[]);
  function crit(name,val){var pct=val?Math.min(100,(parseFloat(val)/9)*100):0;
    return '<div style="margin-bottom:10px"><div style="display:flex;justify-content:space-between;font-size:.85rem"><span>'+name+'</span><b>'+(val||'—')+'</b></div><div style="height:6px;background:#E5E9EE;border-radius:4px"><div style="height:100%;width:'+pct+'%;background:linear-gradient(90deg,#0A6EBD,#0A93BD);border-radius:4px"></div></div></div>';}
  var header='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">'+
    '<h2 style="margin:0;font-family:var(--aw-font-display);font-size:1.25rem">'+AW.esc(g.name||g.studentId)+' — '+AW.esc(g.topic||'')+'</h2>'+
    '<div><button class="aw-btn aw-btn-accent" style="padding:6px 14px;margin-right:6px" onclick="exportTeacherDoc('+gi+')">📄 Save to Google Doc</button>'+
    '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px;margin-right:6px" onclick="printTeacherFeedback()">⤓ Print/PDF</button>'+
    '<button class="aw-btn aw-btn-ghost" style="padding:6px 14px" onclick="closeEssayModal()">Close</button></div></div>';
  var body;
  if(!showList.length){
    body='<div class="aw-empty" style="padding:40px 20px">'+AW.icon('results')+'<p>Student has not completed this attempt yet.</p></div>';
  } else {
    body='<div id="teacherReviewContent">'+showList.map(function(item){
      var x=item.x, i=item.i;
      var fb=null; try{ fb=x.feedback?JSON.parse(x.feedback):null; }catch(e){}
      var s=(fb&&fb.scores)||{tr:x.tr,cc:x.cc,lr:x.lr,gra:x.gra};
      var out='<div class="rv-block"><h4>Attempt '+(i+1)+' — Band '+(x.overall||'—')+'</h4>';
      // score bars
      out+='<div style="display:flex;align-items:center;gap:14px;margin:8px 0 14px">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#0A6EBD,#0A93BD);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;flex:0 0 auto"><b style="font-size:1.3rem">'+(x.overall||'—')+'</b><span style="font-size:.5rem">BAND</span></div>'+
        '<div style="flex:1">'+crit('Task Response',s.TR||x.tr)+crit('Coherence & Cohesion',s.CC||x.cc)+crit('Lexical Resource',s.LR||x.lr)+crit('Grammar',s.GRA||x.gra)+'</div>'+
      '</div>';
      // essay
      out+=x.essay?'<h4 style="color:var(--aw-primary);text-transform:uppercase;font-size:.82rem;margin:8px 0 6px">Essay</h4><div style="white-space:pre-wrap;font-size:.88rem;line-height:1.6;background:var(--aw-surface-2);padding:12px;border-radius:8px;margin-bottom:10px">'+AW.esc(x.essay)+'</div>':'<p style="color:var(--aw-ink-3)">No essay text.</p>';
      // feedback detail
      if(fb){
        out+='<h4 style="color:var(--aw-primary);text-transform:uppercase;font-size:.82rem;margin:12px 0 6px">AI Feedback</h4>';
        if(fb.overall_feedback_vi) out+='<p style="margin:0 0 8px"><b>Overall:</b> '+AW.esc(fb.overall_feedback_vi)+'</p>';
        if(fb.repeated_errors_vi) out+='<p style="margin:0 0 8px;background:#FFF8EC;padding:8px;border-radius:6px"><b>⚠ Repeated errors:</b> '+AW.esc(fb.repeated_errors_vi)+'</p>';
        if((fb.tr_comments||[]).length) out+='<p style="margin:0 0 8px"><b>Task Response:</b> '+fb.tr_comments.slice(0,3).map(function(c){return AW.esc(c.assessment_vi||'');}).join(' ')+'</p>';
        if((fb.gra_errors||[]).length) out+='<p style="margin:0 0 8px"><b>Grammar:</b> '+fb.gra_errors.slice(0,8).map(function(e){return '<span style="color:#EA4335;text-decoration:line-through">'+AW.esc(e.wrong)+'</span>→<span style="color:#1E7E42">'+AW.esc(e.correct)+'</span>';}).join('; ')+'</p>';
        if((fb.lr_issues||[]).length) out+='<p style="margin:0 0 8px"><b>Vocabulary:</b> '+fb.lr_issues.slice(0,6).map(function(e){return '<span style="color:#EA4335;text-decoration:line-through">'+AW.esc(e.original)+'</span>→<span style="color:#1E7E42">'+AW.esc(e.better)+'</span>';}).join('; ')+'</p>';
        if(fb.cc_feedback&&fb.cc_feedback.assessment_vi) out+='<p style="margin:0 0 8px"><b>Coherence:</b> '+AW.esc(fb.cc_feedback.assessment_vi)+'</p>';
      } else {
        out+='<p style="color:var(--aw-ink-3);font-size:.85rem;background:#FFF8EC;padding:8px;border-radius:6px">No stored AI feedback for this attempt (submitted before feedback storage was enabled). New submissions will include full feedback.</p>';
      }
      return out+'</div>';
    }).join('')+'</div>';
  }
  document.getElementById('essayModalBody').innerHTML=header+body;
  document.getElementById('essayModal').classList.add('show');
};
window.closeEssayModal=function(){document.getElementById('essayModal').classList.remove('show');};
window.printTeacherFeedback=function(){
  var el=document.getElementById('teacherReviewContent'); if(!el)return;
  var w=window.open('','_blank');
  w.document.write('<html><head><title>ArticuWrite Feedback</title><style>body{font-family:Inter,system-ui,sans-serif;max-width:720px;margin:30px auto;padding:0 20px;color:#10222E}h4{color:#0A6EBD;margin:16px 0 6px;font-size:.9rem}.rv-block{margin-top:14px;padding-top:14px;border-top:1px solid #E5E9EE}p{line-height:1.5;font-size:.9rem}</style></head><body><h1 style="color:#0A6EBD">ArticuWrite — Feedback</h1>'+el.innerHTML+'<p style="margin-top:30px;font-size:.75rem;color:#889">Generated by ArticuWrite · '+new Date().toLocaleString()+'</p></body></html>');
  w.document.close(); setTimeout(function(){w.print();},400);
};
window.exportTeacherDoc=function(gi){
  var g=resultsData[gi]; if(!g||!g.writes.length)return;
  var w0=g.writes[0];
  AW.toast('Creating Google Doc…');
  AW.api('write.exportDoc',{studentId:g.studentId,topicId:g.topicId,mode:document.querySelector('.aw-tab.active').dataset.mode}).then(function(res){
    if(res&&res.success){ AW.toast('Doc ready!','ok'); window.open(res.data.url,'_blank'); }
    else AW.toast((res&&res.error)||'Export failed','err',4000);
  });
};

/*═══════════ ASSIGNMENTS ═══════════*/
function showAssignments(){
  document.getElementById('awPageTitle').textContent='Assignments';
  content.innerHTML=
    '<div style="display:flex;gap:10px;margin-bottom:16px">'+
      '<button class="aw-btn aw-btn-primary" onclick="newAssignment(\'homework\')">+ New Homework</button>'+
      '<button class="aw-btn aw-btn-ghost" onclick="newAssignment(\'inclass\')">+ New In-class Task</button>'+
    '</div>'+
    '<div class="aw-tabs" id="assignTabs">'+
      '<button class="aw-tab active" data-amode="inclass">In-class Practice</button>'+
      '<button class="aw-tab" data-amode="homework">Homework</button>'+
    '</div>'+
    '<div id="assignList"><div class="aw-empty"><span class="aw-spin aw-spin-dark"></span></div></div>';
  AW.els('[data-amode]').forEach(function(t){
    t.onclick=function(){
      AW.els('[data-amode]').forEach(function(x){x.classList.remove('active');});
      t.classList.add('active');
      loadAssignmentList(t.dataset.amode);
    };
  });
  loadAssignmentList('inclass');
}
function loadAssignmentList(mode){
  AW.api('write.getAssignments',{class:curClass(),mode:mode}).then(function(res){
    var rows=(res&&res.data)||[];
    var box=document.getElementById('assignList');
    if(!box)return;
    if(!rows.length){
      box.innerHTML='<div class="aw-empty">'+AW.icon('modes')+'<p>No '+(mode==='inclass'?'In-class':'Homework')+' assignments yet.</p></div>';
      return;
    }
    box.innerHTML='<div class="aw-table-wrap"><table class="aw-table"><thead><tr>'+
      '<th>Topic</th><th>Class</th><th>Required</th><th>Deadline</th></tr></thead><tbody>'+
      rows.map(function(a){
        var plain=AW.stripHtml?AW.stripHtml(a.prompt||''):(a.prompt||'').replace(/<[^>]*>/g,'');
        return '<tr><td><b>'+AW.esc(a.topic)+'</b><br><span style="font-size:.8rem;color:var(--aw-ink-3)">'+AW.esc(plain.slice(0,80))+'</span></td>'+
          '<td>'+AW.esc((curClassObj()&&curClassObj().className)||a.class||curClass())+'</td>'+
          '<td style="text-align:center">'+(a.requiredAttempts||1)+'</td>'+
          '<td>'+(a.deadline?AW.esc(a.deadline):'—')+'</td></tr>';
      }).join('')+'</tbody></table></div>';
  });
}
var assignMode='homework';
window.newAssignment=function(mode){
  assignMode=mode||'homework';
  document.getElementById('assignTitle').textContent = assignMode==='homework'?'New Homework':'New In-class Task';
  document.getElementById('aTopic').value='';
  document.getElementById('aPrompt').innerHTML='';
  document.getElementById('reqField').style.display = assignMode==='homework'?'':'none';
  document.getElementById('durField').style.display = assignMode==='inclass'?'':'none';
  document.getElementById('deadField').style.display = assignMode==='homework'?'':'none';
  document.getElementById('assignModal').classList.add('show');
};
// mini toolbar
AW.els('.aw-editor-mini-tb button').forEach(function(b){
  b.onclick=function(){ document.execCommand(b.dataset.c,false,null); document.getElementById('aPrompt').focus(); };
});
document.getElementById('aCancel').onclick=function(){ document.getElementById('assignModal').classList.remove('show'); };
document.getElementById('aCreate').onclick=function(){
  var topic=document.getElementById('aTopic').value.trim();
  var promptHtml=document.getElementById('aPrompt').innerHTML.trim();
  if(!topic){AW.toast('Enter a topic.','err');return;}
  var btn=this; btn.disabled=true; var o=btn.textContent; btn.innerHTML='<span class="aw-spin"></span>';
  AW.api('teacher.createAssignment',{
    class:curClass(), mode:assignMode, topic:topic, prompt:promptHtml,
    requiredAttempts:assignMode==='homework'?parseInt(document.getElementById('aReq').value||'1',10):1,
    durationMin:assignMode==='inclass'?parseInt(document.getElementById('aDur').value||'0',10):'',
    deadline:assignMode==='homework'?document.getElementById('aDead').value:''
  }).then(function(res){
    if(res&&res.success){AW.toast('Assignment created & assigned','ok');document.getElementById('assignModal').classList.remove('show');showAssignments();}
    else AW.toast('Failed to create','err');
  }).finally(function(){ btn.disabled=false; btn.textContent=o; });
};

/*═══════════ SETTINGS ═══════════*/

      '<td><button class="aw-btn aw-btn-ghost" style="padding:4px 10px;font-size:.75rem;color:var(--aw-danger)" onclick="archiveClass(\''+AW.esc(c.classId)+'\',\''+AW.esc(c.className)+'\')">Archive</button></td></tr>';
  }).join('');
  content.innerHTML='<div class="aw-card" style="padding:24px;max-width:600px;margin-bottom:16px">'+
    '<h3 style="margin:0 0 6px">Account</h3>'+
    '<p style="color:var(--aw-ink-2);font-size:.9rem">Name: <b>'+AW.esc(sess.name||'')+'</b><br>Email: <b>'+AW.esc(sess.email||'')+'</b></p>'+
    '</div>'+
    '<div class="aw-card" style="padding:24px;max-width:600px;margin-bottom:16px">'+
    '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><h3 style="margin:0">My Classes</h3>'+
    '<button class="aw-btn aw-btn-primary" style="padding:7px 14px" onclick="showCreateClass()">+ New Class</button></div>'+
    (myClasses.length?'<div class="aw-table-wrap"><table class="aw-table"><thead><tr><th>Class Name</th><th>Class Code</th><th>Year</th><th>Semester</th><th></th></tr></thead><tbody>'+clsRows+'</tbody></table></div>':'<p style="color:var(--aw-ink-3)">No classes yet.</p>')+
    '</div>'+
    '<div class="aw-card" style="padding:24px;max-width:600px">'+
      '<h3 style="margin:0 0 14px">Change Password</h3>'+
      '<div class="aw-field"><label class="aw-label">Current password</label><input class="aw-input" id="tpwOld" type="password"></div>'+
      '<div class="aw-field"><label class="aw-label">New password</label><input class="aw-input" id="tpwNew" type="password"></div>'+
      '<div class="aw-field"><label class="aw-label">Confirm</label><input class="aw-input" id="tpwNew2" type="password"></div>'+
      '<button class="aw-btn aw-btn-primary" id="tpwBtn">Update password</button>'+
    '</div>';
  document.getElementById('tpwBtn').onclick=function(){
    var o=document.getElementById('tpwOld').value, n=document.getElementById('tpwNew').value, n2=document.getElementById('tpwNew2').value;
    if(!o||!n){AW.toast('Please fill all fields.','err');return;}
    if(n!==n2){AW.toast('New passwords do not match.','err');return;}
    AW.api('auth.changePassword',{email:sess.email,oldPass:o,newPass:n}).then(function(res){
      if(res&&res.success)AW.toast('Password changed','ok');
      else AW.toast((res&&res.error)||'Failed','err');
    });
  };
}
window.archiveClass=function(classId,className){
  if(!confirm('Archive class "'+className+'"?\nStudents will no longer see it and it will be hidden from your dashboard. Data is preserved.'))return;
  AW.api('class.archive',{classId:classId}).then(function(res){
    if(res&&res.success){
      AW.toast('Class archived','ok');
      if(curClass()===classId) localStorage.removeItem(CLASS_KEY);
      setTimeout(function(){location.reload();},700);
    } else AW.toast((res&&res.error)||'Failed','err');
  });
};
window.archiveStudent=function(studentId,name){
  if(!confirm('Archive student "'+name+'" ('+studentId+')?\nThey will be removed from the roster. Data is preserved.'))return;
  AW.api('student.archive',{studentId:studentId}).then(function(res){
    if(res&&res.success){ AW.toast('Student archived','ok'); loadRoster(); }
    else AW.toast((res&&res.error)||'Failed','err');
  });
};

function routeInitial(){
  var hash=(location.hash||'').replace('#','');
  if(hash==='live'){showLive();AW.setActiveNav('live');}
  else if(hash==='results'){showResults();AW.setActiveNav('results');}
  else if(hash==='assignments'){showAssignments();AW.setActiveNav('assignments');}
  else showOverview();
}
